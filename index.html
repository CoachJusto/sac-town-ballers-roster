// The data is now stored locally on the device's browser
const LOCAL_STORAGE_KEY = 'ballers_roster_db';

let db = { players: [] };
let state = { screen:'splash', selectedTeam:null, selectedPlayer:null, showEditModal:false, tempPlayer:null };

// Helpers
function uuid(){ return 'id-'+Math.random().toString(36).slice(2)+Date.now().toString(36); }
const placeholders = { fullName:"Player Full Name", jerseyNumber:"Jersey #", jerseySize:"Size", birthdate:"MM/DD/YYYY", parentName:"Parent Name", parentEmail:"Parent Email", parentPhone:"Parent Phone" };

// Load players from Local Storage
function loadDb(){
  const savedData = localStorage.getItem(LOCAL_STORAGE_KEY);
  if (savedData) {
    try {
      db.players = JSON.parse(savedData);
    } catch (e) {
      console.error("Error parsing local data", e);
      db.players = [];
    }
  }
}

// Save player to Local Storage
function savePlayer(player){
  const index = db.players.findIndex(p => p.id === player.id);
  
  if (player.status === 'deleted') {
    db.players = db.players.filter(p => p.id !== player.id);
  } else if (index !== -1) {
    db.players[index] = player;
  } else {
    db.players.push(player);
  }
  
  localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(db.players));
}
