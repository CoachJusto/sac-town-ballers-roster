<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sac Town Ballers Roster (Cloud)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --pantone-802c: #00FF6C; }
    .pantone-802c { color: var(--pantone-802c); }
    .bg-pantone-802c { background-color: var(--pantone-802c); }

  <div id="app" class="w-full h-full"></div>

  <script type="module">
    // 1. Import Firebase SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 2. Your Specific Firebase Config
    const firebaseConfig = {

      projectId: "sac-town-ballers-roster",
      storageBucket: "sac-town-ballers-roster.firebasestorage.app",

      appId: "1:80873311127:web:c59008f0242cf5123052d2",
      measurementId: "G-T5DL7XWQY2"
    };

    // 3. Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ---------------- Global State ----------------
    const TEAMS = ['Jr. High', 'JV', 'Varsity'];
    let dbData = { players: [] };
    let state = { 
      screen: 'splash', 
      selectedTeam: null, 
      selectedPlayer: null, 
      showEditModal: false, 
      tempPlayer: null 
    };

    const placeholders = { 
      fullName: "Player Full Name", 
      jerseyNumber: "Jersey #", 
      jerseySize: "Size", 
      birthdate: "MM/DD/YYYY", 
      parentName: "Parent Name", 
      parentEmail: "Parent Email", 
      parentPhone: "Parent Phone" 
    };

    function uuid() { 
      return 'id-' + Math.random().toString(36).slice(2) + Date.now().toString(36); 
    }

    // ---------------- Cloud Storage Functions ----------------
    function loadDb() {
      const playersRef = ref(db, 'players');
      // Listens to the cloud and updates the UI automatically
      onValue(playersRef, (snapshot) => {
        const data = snapshot.val();
        dbData.players = data ? Object.values(data) : [];
        render();
      });
    }

    async function savePlayer(player) {
      const playerRef = ref(db, 'players/' + player.id);
      if (player.status === 'deleted') {
        await remove(playerRef);
      } else {
        await set(playerRef, player);
      }
    }

    // ---------------- Render Function ----------------
    function render() {
      const appEl = document.getElementById('app');
      if (!appEl) return;
      appEl.innerHTML = '';

      // --- Splash Screen ---
      if (state.screen === 'splash') {
        const div = document.createElement('div');
        div.className = 'flex flex-col items-center justify-center h-full';
        div.innerHTML = `
          <img src='https://i.ibb.co/s9vfBcCz/Ballers-BLogo-Final.png' alt='Ballers Logo' class='w-48 mb-4'/>
          <h1 class='text-2xl md:text-3xl font-semibold text-white mb-2'>Sac Town Ballers</h1>
          <h2 class='text-6xl md:text-8xl font-black pantone-802c'>Roster</h2>
        `;
        appEl.appendChild(div);
        setTimeout(() => { state.screen = 'teamSelect'; render(); }, 2000);
        return;
      }

      // --- Team Selection ---
      if (state.screen === 'teamSelect') {
        const div = document.createElement('div');
        div.className = 'flex flex-col items-center gap-6 mt-6';
        div.innerHTML = `<div class='text-white text-sm mb-4 text-center'>Select what team you'd like to manage</div>`;
        
        TEAMS.forEach(team => {
          const btn = document.createElement('button');
          btn.textContent = team;
          btn.className = 'w-48 px-8 py-4 rounded-2xl font-bold bg-pantone-802c hover-bg-pantone-802c text-slate-950 text-xl';
          btn.onclick = () => { state.selectedTeam = team; state.screen = 'roster'; render(); };
          div.appendChild(btn);
        });
        appEl.appendChild(div);
        return;
      }

      // --- Roster Page ---
      if (state.screen === 'roster') {
