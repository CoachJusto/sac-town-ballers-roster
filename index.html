<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ballers Manager Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    body, html { 
      background-color: #020617; 
      color: white; 
      font-family: sans-serif; 
      height: 100vh; 
      overflow: hidden; 
      margin: 0; 
      font-size: 18px;
      /* Prevents system callouts on long press */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #app { height: 100%; display: flex; flex-direction: column; }
    .btn-main { width: 280px; padding: 1.25rem; border-radius: 1rem; text-transform: uppercase; font-style: italic; font-weight: 900; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; letter-spacing: 0.05em; position: relative; }
    .btn-gradient { background: linear-gradient(135deg, #38ff14 0%, #028e3a 100%); color: black; }
    .btn-outline { border: 2px dashed #334155; color: #94a3b8; }
    .btn-alert { background: #22c55e; color: black; border: none; }
    .notif-badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; font-size: 12px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #020617; }
    .player-card { background: #0f172a; border: 1px solid #1e293b; padding: 0.6rem 1rem; border-radius: 0.75rem; margin-bottom: 0.4rem; cursor: pointer; touch-action: none; }
    .player-card.selected { background: #1e293b; border-color: #38ff14; }
    .profile-modal { background: #0f172a; border: 2px solid #334155; width: 92%; max-width: 400px; border-radius: 1.5rem; padding: 1.5rem; position: relative; max-height: 90vh; overflow-y: auto; }
    input, select { background: #1e293b !important; border: 1px solid #475569 !important; color: white !important; padding: 0.5rem 0.75rem !important; border-radius: 0.5rem !important; width: 100%; height: 2.8rem; font-size: 1rem; -webkit-user-select: text; user-select: text; }
    .custom-checkbox { width: 22px; height: 22px; border: 2px solid #475569; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .custom-checkbox.checked { background: #38ff14; border-color: #38ff14; }
    .custom-checkbox.checked::after { content: '✓'; color: black; font-weight: 900; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBRlFQLj41BR_59Pjh3WDPpDjDxCnf4AXs",
      authDomain: "sac-town-ballers-roster.firebaseapp.com",
      databaseURL: "https://sac-town-ballers-roster-default-rtdb.firebaseio.com/",
      projectId: "sac-town-ballers-roster",
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dbData = { players: {}, teams: {} };
    let state = { screen: 'main', selectedTeam: null, searchQuery: '', pendingTryouts: 0, selectionMode: false, selectedIds: [] };
    let pressTimer;

    db.ref('/').on('value', (snap) => {
      const data = snap.val() || {};
      dbData.players = data.players || {};
      dbData.teams = data.teams || { "JV": true, "Varsity": true };
      if (state.screen === 'main') checkForNewSignups();
      render();
    });

    async function checkForNewSignups() {
      const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStWiziLmn7ZOT7DZT7ak_E4XDLsl4g3yEBqeDARSz7LC6NoFj4GfpKSBjrKtKUkxSsvEegywlD6Rd5/pub?gid=1820988393&single=true&output=csv";
      try {
        const res = await fetch(csvUrl);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        const existingNames = Object.values(dbData.players).map(p => (p.fullName || "").toLowerCase().trim());
        let count = 0;
        rows.forEach(row => {
          const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          const name = c[5]?.replace(/"/g, '').trim();
          if (name && !existingNames.includes(name.toLowerCase())) count++;
        });
        state.pendingTryouts = count;
        render();
      } catch (e) { console.warn("Mobile Fetch Blocked or Network Error"); }
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = '';

      if (state.screen === 'main') {
        const teams = Object.keys(dbData.teams);
        app.innerHTML = `
          <div class="flex flex-col items-center pt-12 px-4 w-full h-full">
            <button onclick="addTeam()" class="absolute top-4 right-4 text-white text-[12px] font-bold bg-white/10 px-4 py-2 rounded">+ TEAM</button>
            <img src="https://i.ibb.co/s9vfBcCz/Ballers-BLogo-Final.png" class="w-24 mb-10">
            <div class="flex flex-col gap-4 overflow-y-auto pb-10">
              ${teams.map(t => `<button onclick="go('${t}')" class="btn-main btn-gradient">${t}</button>`).join('')}
              <button onclick="go('Tryouts')" class="btn-main ${state.pendingTryouts > 0 ? 'btn-alert' : 'btn-outline'}">
                TRYOUTS
                ${state.pendingTryouts > 0 ? `<div class="notif-badge">${state.pendingTryouts}</div>` : ''}
              </button>
              <button onclick="go('Unrostered')" class="mt-4 text-[12px] font-bold text-slate-500 uppercase tracking-widest self-center">View Unrostered List</button>
            </div>
          </div>
        `;
      } else {
        const isT = state.selectedTeam === 'Tryouts';
        const list = Object.entries(dbData.players)
          .filter(([id, p]) => p.team === state.selectedTeam && (p.fullName || "").toLowerCase().includes(state.searchQuery.toLowerCase()))
          .sort((a, b) => isT ? new Date(b[1].signUpDate || 0) - new Date(a[1].signUpDate || 0) : (a[1].fullName || "").localeCompare(b[1].fullName || ""));

        app.innerHTML = `
          <div class="p-5 flex flex-col h-full">
            <div class="flex justify-between items-center mb-4">
              <button onclick="state.selectionMode ? cancelSelection() : goBack()" class="text-slate-400 text-[11px] font-black uppercase">${state.selectionMode ? 'Cancel' : '← Back'}</button>
              <div class="text-center">
                <h2 class="text-xl font-black italic uppercase leading-none">${state.selectedTeam}</h2>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">${state.selectionMode ? state.selectedIds.length + ' Selected' : list.length + ' Players'}</p>
              </div>
              <div class="flex gap-2">
                ${isT && !state.selectionMode ? `<button onclick="syncSheet()" class="text-green-400 text-[10px] font-black uppercase">Sync</button>` : '<div class="w-8"></div>'}
              </div>
            </div>

            <div class="relative mb-4">
              <input type="text" placeholder="Search..." class="pl-10 rounded-full bg-slate-900 border-slate-800 w-full h-10 text-sm" value="${state.searchQuery}" oninput="updateSearch(this.value)">
              <span class="absolute left-4 top-2.5 opacity-30">🔍</span>
            </div>
            
            <div class="flex-1 overflow-y-auto space-y-1 pb-24">
              ${list.map(([id, p]) => `
                <div class="player-card flex justify-between items-center ${state.selectedIds.includes(id) ? 'selected' : ''}" 
                     onpointerdown="startPress('${id}')" onpointerup="endPress('${id}')" onpointerleave="endPress()"
                     onclick="handleTap('${id}')">
                  <div class="flex-1">
                    <div class="font-black uppercase text-[16px]">${p.fullName}</div>
                    <div class="text-[10px] text-slate-400 font-bold uppercase">${isT ? p.grade : '#' + (p.jersey || '00')}</div>
                  </div>
                  ${state.selectionMode ? `<div class="custom-checkbox ${state.selectedIds.includes(id) ? 'checked' : ''}"></div>` : ''}
                </div>
              `).join('')}
            </div>

            <div class="fixed bottom-6 left-0 right-0 px-5">
              ${state.selectionMode ? 
                `<button onclick="bulkMove()" class="w-full py-4 bg-red-600 text-white font-black rounded-xl">MOVE ${state.selectedIds.length} TO UNROSTERED</button>` : 
                (!isT ? `<button onclick="showManualAdd()" class="w-full py-4 bg-white text-black font-black rounded-xl">+ ADD PLAYER</button>` : '')
              }
            </div>
          </div>
        `;
      }
    }

    // Pointer events handle both mouse and touch
    window.startPress = (id) => {
      if (state.selectionMode) return;
      pressTimer = setTimeout(() => {
        state.selectionMode = true;
        toggleSelection(id);
      }, 600);
    };

    window.endPress = () => clearTimeout(pressTimer);

    window.handleTap = (id) => {
      if (state.selectionMode) toggleSelection(id);
      else openProfile(id);
    };

    window.toggleSelection = (id) => {
      const idx = state.selectedIds.indexOf(id);
      idx > -1 ? state.selectedIds.splice(idx, 1) : state.selectedIds.push(id);
      if (state.selectedIds.length === 0) state.selectionMode = false;
      render();
    };

    window.cancelSelection = () => { state.selectionMode = false; state.selectedIds = []; render(); };

    window.bulkMove = () => {
      if (!confirm("Move selected to Unrostered?")) return;
      const up = {};
      state.selectedIds.forEach(id => up[`players/${id}/team`] = 'Unrostered');
      db.ref().update(up).then(() => cancelSelection());
    };

    window.updateSearch = (v) => { state.searchQuery = v; render(); };
    window.goBack = () => { state.screen = 'main'; state.searchQuery = ''; render(); };
    window.go = (t) => { state.selectedTeam = t; state.screen = 'roster'; render(); };

    // Placeholder for necessary functions (manual add, profile modal, etc)
    window.addTeam = () => { let n = prompt("Team Name:"); if(n) db.ref(`teams/${n}`).set(true); };
    window.syncSheet = async () => { /* Same sync logic as before */ alert("Syncing..."); };

  </script>
</body>
</html>
