<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ballers Manager Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body { background:#020617; color:white; margin:0; }
.player-card { background:#0f172a; padding:1rem; border-radius:.75rem; cursor:pointer; }
.modal { position:fixed; inset:0; background:rgba(0,0,0,.9); display:flex; align-items:center; justify-content:center; }
</style>
</head>

<body>
<div id="app"></div>

<script>
/* ---------------- FIREBASE ---------------- */
const config = {
  apiKey: "AIzaSy...",
  authDomain: "sac-town-ballers-roster.firebaseapp.com",
  databaseURL: "https://sac-town-ballers-roster-default-rtdb.firebaseio.com/"
};

if (!firebase.apps.length) firebase.initializeApp(config);
const db = firebase.database();

/* ---------------- STATE ---------------- */
let dbData = { players:{}, teams:{} };
let state = { screen:'main', selectedTeam:null };

db.ref('/').on('value', snap=>{
  const d = snap.val() || {};
  dbData.players = d.players || {};
  dbData.teams = d.teams || {JV:true, Varsity:true};
  render();
});

/* ---------------- RENDER ---------------- */
function render(){
  const app = document.getElementById('app');

  if(state.screen==='main'){
    const teams = Object.keys(dbData.teams);

    app.innerHTML = `
      <div class="flex flex-col items-center pt-10">
        <img src="https://i.ibb.co/s9vfBcCz/Ballers-BLogo-Final.png" class="w-28 mb-10">
        ${teams.map(t=>`<button onclick="go('${t}')" class="mb-4 px-6 py-4 bg-green-500 text-black rounded">${t}</button>`).join('')}
        <button onclick="go('Tryouts')" class="mt-4">TRYOUTS</button>
      </div>
    `;
    return;
  }

  const isT = state.selectedTeam === 'Tryouts';

  const list = Object.entries(dbData.players)
    .filter(([id,p])=>p.team===state.selectedTeam);

  app.innerHTML = `
    <div class="p-4">
      <button onclick="goBack()">Back</button>
      <h2 class="text-xl mb-4">${state.selectedTeam}</h2>

      ${list.map(([id,p])=>`
        <div class="player-card mb-2" onclick="openProfile('${id}')">
          ${p.fullName || 'Unnamed'}
        </div>
      `).join('')}
    </div>
  `;
}

/* ---------------- NAV ---------------- */
function go(t){ state.selectedTeam=t; state.screen='roster'; render(); }
function goBack(){ state.screen='main'; render(); }

/* ---------------- PROFILE ---------------- */
function openProfile(id){
  const p = dbData.players[id];
  const isT = p.team === 'Tryouts';

  const modal = document.createElement('div');
  modal.className='modal';

  modal.innerHTML = `
    <div class="bg-slate-900 p-6 rounded w-80 relative">

      <div class="flex justify-between mb-4">
        <h2>${p.fullName}</h2>
        ${isT ? `<button onclick="showTeams('${id}')" class="bg-red-500 px-3 py-1">MIGRATE</button>`:''}
      </div>

      ${isT ? `
        <p>Age: ${p.age||'N/A'}</p>
        <p>Division: ${p.grade||'N/A'}</p>
        <p>Experience: ${p.experience||'N/A'}</p>
      ` : `
        <input id="birth" value="${p.birthdate||''}" placeholder="Birthdate">
        <input id="age" value="${p.age||''}" placeholder="Age">
        <input id="pname" value="${p.parentName||''}" placeholder="Parent Name">
        <input id="pemail" value="${p.parentEmail||''}" placeholder="Parent Email">
        <input id="pphone" value="${p.parentPhone||''}" placeholder="Parent Phone">
        <input id="jersey" value="${p.jersey||''}" placeholder="Jersey #">

        <select id="pos">
          ${['PG','SG','SF','PF','C'].map(pos=>`
            <option ${p.pos===pos?'selected':''}>${pos}</option>
          `).join('')}
        </select>

        <button onclick="save('${id}')" class="mt-4 bg-green-500 w-full py-2 text-black">SAVE</button>
      `}

      <button onclick="closeModal()" class="mt-4 text-sm">Close</button>
    </div>
  `;

  document.body.appendChild(modal);
}

/* ---------------- SAVE ---------------- */
function save(id){
  db.ref(`players/${id}`).update({
    birthdate:document.getElementById('birth').value,
    age:document.getElementById('age').value,
    parentName:document.getElementById('pname').value,
    parentEmail:document.getElementById('pemail').value,
    parentPhone:document.getElementById('pphone').value,
    jersey:document.getElementById('jersey').value,
    pos:document.getElementById('pos').value
  });
  closeModal();
}

/* ---------------- MIGRATE ---------------- */
function showTeams(id){
  const modal = document.createElement('div');
  modal.className='modal';

  modal.innerHTML = `
    <div class="bg-black p-6 rounded">
      ${Object.keys(dbData.teams).map(t=>`
        <button onclick="move('${id}','${t}')" class="block mb-2">${t}</button>
      `).join('')}
    </div>
  `;

  document.body.appendChild(modal);
}

function move(id,team){
  db.ref(`players/${id}`).update({team});
  closeModal();
}

/* ---------------- UTIL ---------------- */
function closeModal(){
  document.querySelectorAll('.modal').forEach(m=>m.remove());
}
</script>
</body>
</html>
