<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sac Town Ballers Roster</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --pantone-802c: #00FF6C; }
    .pantone-802c { color: var(--pantone-802c); }
    .bg-pantone-802c { background-color: var(--pantone-802c); }
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #020617; }
  </style>
</head>
<body class="text-white">
  <div id="app" class="w-full min-h-screen flex flex-col items-center justify-center">
    <p class="text-slate-500">Loading Ballers Roster...</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRlFQLj41BR_59Pjh3WDPpDjDxCnf4AXs",
      authDomain: "sac-town-ballers-roster.firebaseapp.com",
      databaseURL: "https://sac-town-ballers-roster-default-rtdb.firebaseio.com/",
      projectId: "sac-town-ballers-roster",
      storageBucket: "sac-town-ballers-roster.firebasestorage.app",
      messagingSenderId: "80873311127",
      appId: "1:80873311127:web:c59008f0242cf5123052d2",
      measurementId: "G-T5DL7XWQY2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- State ---
    const TEAMS = ['Jr. High', 'JV', 'Varsity'];
    let dbData = { players: [] };
    let state = { screen: 'splash', selectedTeam: null, showEditModal: false, tempPlayer: null };

    // --- Cloud Functions ---
    function loadDb() {
      const playersRef = ref(db, 'players');
      onValue(playersRef, (snapshot) => {
        const data = snapshot.val();
        dbData.players = data ? Object.values(data) : [];
        render(); // Re-draw when data arrives
      });
    }

    async function savePlayer(player) {
      const playerRef = ref(db, 'players/' + player.id);
      if (player.status === 'deleted') { await remove(playerRef); }
      else { await set(playerRef, player); }
    }

    // --- UI Logic ---
    function render() {
      const appEl = document.getElementById('app');
      if (!appEl) return;
      appEl.innerHTML = '';
      appEl.className = "w-full min-h-screen flex flex-col items-center justify-start pt-10";

      if (state.screen === 'splash') {
        appEl.className = "w-full min-h-screen flex flex-col items-center justify-center";
        appEl.innerHTML = `
          <img src='https://i.ibb.co/s9vfBcCz/Ballers-BLogo-Final.png' style='width: 200px;' class='mb-4'/>
          <h1 class='text-3xl font-bold'>Sac Town Ballers</h1>
          <h2 class='text-7xl font-black pantone-802c uppercase'>Roster</h2>
        `;
        return;
      }

      if (state.screen === 'teamSelect') {
        appEl.innerHTML = `<h2 class='mb-8 text-xl'>Select a Team</h2>`;
        TEAMS.forEach(team => {
          const btn = document.createElement('button');
          btn.className = 'w-64 py-4 mb-4 rounded-xl font-bold bg-pantone-802c text-slate-950 text-xl';
          btn.textContent = team;
          btn.onclick = () => { state.selectedTeam = team; state.screen = 'roster'; render(); };
          appEl.appendChild(btn);
        });
      }

      if (state.screen === 'roster') {
        appEl.innerHTML = `
          <div class="w-full max-w-md px-6">
            <div class="flex justify-between items-center mb-6">
              <button id="back" class="text-slate-400">Back</button>
              <h2 class="text-2xl font-bold">${state.selectedTeam}</h2>
              <button id="add" class="bg-pantone-802c text-black px-4 py-1 rounded font-bold text-sm">ADD</button>
            </div>
            <div id="playerList"></div>
          </div>
        `;
        appEl.querySelector('#back').onclick = () => { state.screen = 'teamSelect'; render(); };
        appEl.querySelector('#add').onclick = () => { 
          state.tempPlayer = { id: 'id-'+Date.now(), team: state.selectedTeam, fullName: '', jerseyNumber: '', status: 'active' }; 
          state.showEditModal = true; 
          render(); 
        };

        const list = appEl.querySelector('#playerList');
        const teamPlayers = dbData.players.filter(p => p.team === state.selectedTeam && p.status === 'active');
        teamPlayers.forEach(p => {
          const pDiv = document.createElement('div');
          pDiv.className = 'flex justify-between p-4 border-b border-slate-800 cursor-pointer';
          pDiv.innerHTML = `<span>${p.fullName}</span><span class="pantone-802c">#${p.jerseyNumber}</span>`;
          pDiv.onclick = () => { state.tempPlayer = {...p}; state.showEditModal = true; render(); };
          list.appendChild(pDiv);
        });
      }

      if (state.showEditModal) {
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-50';
        modal.innerHTML = `
          <div class="bg-slate-900 p-6 rounded-2xl w-full max-w-sm">
            <input id="nameInp" placeholder="Full Name" value="${state.tempPlayer.fullName}" class="w-full p-3 mb-3 bg-slate-800 rounded border border-slate-700">
            <input id="numInp" placeholder="Jersey #" value="${state.tempPlayer.jerseyNumber}" class="w-full p-3 mb-6 bg-slate-800 rounded border border-slate-700">
            <button id="save" class="w-full py-3 bg-pantone-802c text-black font-bold rounded-xl mb-3">SAVE TO CLOUD</button>
            <button id="cancel" class="w-full py-3 bg-slate-700 text-white rounded-xl">CANCEL</button>
          </div>
        `;
        appEl.appendChild(modal);
        modal.querySelector('#save').onclick = async () => {
          state.tempPlayer.fullName = modal.querySelector('#nameInp').value;
          state.tempPlayer.jerseyNumber = modal.querySelector('#numInp').value;
          await savePlayer(state.tempPlayer);
          state.showEditModal = false;
        };
        modal.querySelector('#cancel').onclick = () => { state.showEditModal = false; render(); };
      }
    }

    // --- Start App ---
    render(); // 1. Draw Splash immediately
    setTimeout(() => { state.screen = 'teamSelect'; render(); }, 2500); // 2. Switch to Select screen
    loadDb(); // 3. Start Cloud Sync
  </script>
</body>
</html>
