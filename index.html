<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ballers Manager Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --pantone-802c: #00FF6C; }
    body, html { background-color: #020617; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
    #app { height: 100%; display: flex; flex-direction: column; }
    
    .btn-main { width: 240px; padding: 1rem; border-radius: 0.75rem; text-transform: uppercase; font-style: italic; font-weight: 900; display: flex; align-items: center; justify-content: center; }
    .btn-gradient { background: linear-gradient(135deg, #38ff14 0%, #028e3a 100%); color: black; }
    .btn-outline { border: 2px dashed #1e293b; color: #475569; }
    .player-card { background: #0f172a; border: 1px solid #1e293b; padding: 0.75rem; border-radius: 0.75rem; }
    
    input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; padding: 0.4rem !important; border-radius: 0.4rem !important; font-size: 0.85rem !important; }
    label { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 2px; display: block; }
    
    @keyframes blink-red { 0%, 100% { background: #ef4444; } 50% { background: #7f1d1d; } }
    .animate-migrate { animation: blink-red 1s infinite; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRlFQLj41BR_59Pjh3WDPpDjDxCnf4AXs",
      authDomain: "sac-town-ballers-roster.firebaseapp.com",
      databaseURL: "https://sac-town-ballers-roster-default-rtdb.firebaseio.com/",
      projectId: "sac-town-ballers-roster",
    };

    const fb = initializeApp(firebaseConfig);
    const db = getDatabase(fb);
    let dbData = { players: {}, teams: {} };
    let state = { screen: 'main', selectedTeam: null };

    // Age Calculator
    const calcAge = (dob) => {
        if(!dob) return "N/A";
        const birth = new Date(dob);
        const diff = Date.now() - birth.getTime();
        return Math.abs(new Date(diff).getUTCFullYear() - 1970);
    };

    function init() {
      onValue(ref(db, '/'), (snap) => {
        const data = snap.val() || {};
        dbData.players = data.players || {};
        dbData.teams = data.teams || { "JV": true, "Varsity": true };
        render();
      });
    }

    async function runSync() {
      const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStWiziLmn7ZOT7DZT7ak_E4XDLsl4g3yEBqeDARSz7LC6NoFj4GfpKSBjrKtKUkxSsvEegywlD6Rd5/pub?gid=1820988393&single=true&output=csv";
      try {
        const res = await fetch(csvUrl);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        const allExistingNames = Object.values(dbData.players).map(p => p.fullName.toLowerCase().trim());
        
        rows.forEach(row => {
          const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          const name = c[5]?.replace(/"/g, '').trim(); // Col F
          if (name && !allExistingNames.includes(name.toLowerCase())) {
            const id = 'p-' + Date.now() + Math.floor(Math.random()*1000);
            set(ref(db, `players/${id}`), {
              fullName: name,
              signUpDate: c[0]?.replace(/"/g, '') || '', // Col A
              parentName: c[1]?.replace(/"/g, '') || '', // Col B
              parentPhone: c[2]?.replace(/"/g, '') || '', // Col C
              parentEmail: c[3]?.replace(/"/g, '') || '', // Col D
              grade: c[4]?.replace(/"/g, '') || 'N/A',
              age: c[6]?.replace(/"/g, '') || 'N/A', // Col G
              team: 'Tryouts',
              status: 'active'
            });
          }
        });
      } catch (e) { console.error("Sync Failed"); }
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = '';

      if (state.screen === 'main') {
        const teams = Object.keys(dbData.teams);
        app.innerHTML = `
          <div class="flex flex-col items-center pt-12 px-4 w-full relative">
            <button onclick="addTeam()" class="absolute top-4 right-4 text-white text-[10px] font-bold bg-white/10 px-3 py-1 rounded">+ TEAM</button>
            <img src="https://i.ibb.co/s9vfBcCz/Ballers-BLogo-Final.png" class="w-20 mb-10">
            <div class="flex flex-col gap-4">
              ${teams.map(t => `<button onclick="go('${t}')" class="btn-main btn-gradient">${t}</button>`).join('')}
              <button onclick="go('Tryouts')" class="btn-main btn-outline">TRYOUTS</button>
              <button onclick="go('Unrostered')" class="mt-4 text-[10px] font-bold text-slate-600 uppercase tracking-widest">View Unrostered</button>
            </div>
          </div>
        `;
      } else {
        const isT = state.selectedTeam === 'Tryouts';
        const isU = state.selectedTeam === 'Unrostered';
        const list = Object.entries(dbData.players)
          .filter(([_, p]) => p.team === state.selectedTeam)
          .sort((a,b) => isT ? new Date(b[1].signUpDate) - new Date(a[1].signUpDate) : a[1].fullName.localeCompare(b[1].fullName));

        app.innerHTML = `
          <div class="p-4 flex flex-col h-full">
            <div class="flex justify-between items-center mb-4">
              ${isT ? `<button onclick="clearTryouts()" class="text-red-500 text-[10px] font-black uppercase">CLEAR</button>` : `<button onclick="state.screen='main';render()" class="text-slate-500 text-[10px] font-black uppercase tracking-widest">← Back</button>`}
              <h2 class="text-xl font-black italic uppercase text-center">${state.selectedTeam}</h2>
              ${isT ? `<button onclick="runSync()" class="text-green-400 text-[10px] font-black uppercase">SYNC</button>` : `<div class="w-10"></div>`}
            </div>

            <div class="flex-1 overflow-y-auto space-y-2 pb-20">
              ${list.map(([id, p]) => `
                <div class="player-card flex justify-between items-center">
                  <div class="cursor-pointer" onclick="openProfile('${id}')">
                    <div class="font-black uppercase text-sm">${p.fullName}</div>
                    <div class="text-[9px] text-slate-500 font-bold uppercase">
                        ${isT ? `Registered: ${p.signUpDate.split(' ')[0]}` : `#${p.jersey || '00'} • ${p.pos || 'POS'}`} • AGE: ${p.age || calcAge(p.dob)} • GR: ${p.grade}
                    </div>
                  </div>
                  <button onclick="migrateMenu('${id}')" class="text-[9px] font-black h-8 px-3 rounded ${isT ? 'animate-migrate text-white' : 'border border-slate-700 text-slate-400'}">
                    ${isT ? 'MIGRATE' : 'MOVE'}
                  </button>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }
    }

    window.openProfile = (id) => {
      const p = dbData.players[id];
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black z-50 p-4';
      modal.innerHTML = `
        <div class="max-w-sm mx-auto h-full flex flex-col">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-black italic uppercase">Player Profile</h2>
            <button onclick="migrateMenu('${id}')" class="text-xl">⇆</button>
          </div>
          
          <div class="grid grid-cols-2 gap-x-3 gap-y-2 flex-1">
            <div class="col-span-2"><label>Athlete's Name</label><input id="p-name" value="${p.fullName}" class="w-full"></div>
            <div><label>Jersey #</label><input id="p-num" value="${p.jersey || ''}" class="w-full"></div>
            <div><label>Position</label>
                <select id="p-pos" class="w-full">
                    <option ${p.pos==='PG'?'selected':''}>PG</option>
                    <option ${p.pos==='SG'?'selected':''}>SG</option>
                    <option ${p.pos==='SF'?'selected':''}>SF</option>
                    <option ${p.pos==='PF'?'selected':''}>PF</option>
                    <option ${p.pos==='C'?'selected':''}>C</option>
                </select>
            </div>
            <div><label>Age</label><input value="${p.age || calcAge(p.dob)}" disabled class="w-full opacity-50"></div>
            <div><label>Grade</label><input id="p-grade" value="${p.grade || ''}" class="w-full"></div>
            <div class="col-span-2"><label>Birthdate</label><input id="p-dob" type="date" value="${p.dob || ''}" class="w-full"></div>
            <div class="col-span-2"><label>Parent/Guardian</label><input id="p-pname" value="${p.parentName || ''}" class="w-full"></div>
            <div><label>Phone</label><input id="p-phone" value="${p.parentPhone || ''}" class="w-full"></div>
            <div><label>Email</label><input id="p-email" value="${p.parentEmail || ''}" class="w-full"></div>
          </div>

          <div class="mt-4 grid grid-cols-2 gap-3 pb-4">
            <button onclick="this.closest('.fixed').remove()" class="py-3 text-[10px] font-bold text-slate-500 uppercase">Cancel</button>
            <button onclick="saveProfile('${id}')" class="py-3 bg-green-500 text-black font-black rounded-lg text-[10px] uppercase">Save</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    };

    window.migrateMenu = (id) => {
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-6';
        modal.innerHTML = `
            <div class="bg-slate-900 p-6 rounded-2xl w-full max-w-xs text-center border border-slate-800">
                <p class="text-xs font-black mb-4 uppercase text-slate-400 tracking-widest">Select Action</p>
                <div class="flex flex-col gap-2">
                    <button onclick="teamSelect('${id}')" class="py-4 bg-white text-black font-black uppercase rounded-xl text-xs">Made Team</button>
                    <button onclick="movePlayer('${id}', 'Unrostered')" class="py-4 bg-slate-800 text-white font-black uppercase rounded-xl text-xs">Didn't Make Team</button>
                    <button onclick="alert('Syncing details...')" class="py-4 border border-blue-500 text-blue-500 font-black uppercase rounded-xl text-xs">Sync To Player</button>
                </div>
                <button onclick="this.closest('.fixed').remove()" class="mt-4 text-slate-500 text-[10px] font-bold">CANCEL</button>
            </div>
        `;
        document.body.appendChild(modal);
    };

    window.teamSelect = (id) => {
        const teams = Object.keys(dbData.teams);
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black z-[70] flex items-center justify-center p-6';
        modal.innerHTML = `
            <div class="bg-slate-900 p-6 rounded-2xl w-full max-w-xs border border-slate-800">
                <div class="flex flex-col gap-2">
                    ${teams.map(t => `<button onclick="movePlayer('${id}', '${t}')" class="py-3 bg-slate-800 text-white font-black uppercase rounded-lg text-xs">${t}</button>`).join('')}
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    };

    window.saveProfile = (id) => {
        const dob = document.getElementById('p-dob').value;
        update(ref(db, `players/${id}`), {
            fullName: document.getElementById('p-name').value,
            jersey: document.getElementById('p-num').value,
            pos: document.getElementById('p-pos').value,
            dob: dob,
            age: calcAge(dob),
            grade: document.getElementById('p-grade').value,
            parentName: document.getElementById('p-pname').value,
            parentPhone: document.getElementById('p-phone').value,
            parentEmail: document.getElementById('p-email').value,
        });
        document.querySelectorAll('.fixed').forEach(m => m.remove());
    };

    window.movePlayer = (id, team) => {
        update(ref(db, `players/${id}`), { team, status: 'active' });
        document.querySelectorAll('.fixed').forEach(m => m.remove());
    };

    window.clearTryouts = () => {
        Object.entries(dbData.players).forEach(([id, p]) => {
            if(p.team === 'Tryouts') remove(ref(db, `players/${id}`));
        });
    };

    window.addTeam = () => {
        const name = prompt("Team Name:");
        if(name) set(ref(db, `teams/${name}`), true);
    };

    window.go = (t) => { state.selectedTeam = t; state.screen = 'roster'; render(); };

    init();
  </script>
</body>
</html>
