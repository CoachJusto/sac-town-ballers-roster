<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ballers Roster & Fees</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --pantone-802c: #00FF6C; }
    .pantone-802c { color: var(--pantone-802c); }
    body, html { background-color: #020617 !important; margin: 0; padding: 0; min-height: 100vh; color: white; font-family: sans-serif; }
    #app { background-color: #020617 !important; min-height: 100vh; }
    
    .btn-main { 
      width: 280px;
      padding: 1.5rem;
      border-radius: 1rem;
      text-transform: uppercase;
      font-style: italic;
      font-weight: 900;
      font-size: 1.25rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-gradient { 
      background: linear-gradient(135deg, #38ff14 0%, #028e3a 100%); 
      color: black;
    }
    .btn-outline {
      border: 2px dashed #1e293b;
      color: #475569;
    }
    .player-card { background: #0f172a; border: 1px solid #1e293b; }
    .edit-pencil { cursor: pointer; font-size: 1.2rem; margin-left: 8px; vertical-align: middle; transition: opacity 0.2s; }
    .edit-pencil:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen flex flex-col items-center justify-center">
    <p class="text-slate-600 animate-pulse uppercase tracking-widest text-xs font-bold">Syncing Ballers Cloud...</p>
  </div>

  <input type="file" id="fileInput" class="hidden" onchange="window.handleFileSelect(event)">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRlFQLj41BR_59Pjh3WDPpDjDxCnf4AXs",
      authDomain: "sac-town-ballers-roster.firebaseapp.com",
      databaseURL: "https://sac-town-ballers-roster-default-rtdb.firebaseio.com/",
      projectId: "sac-town-ballers-roster",
      storageBucket: "sac-town-ballers-roster.firebasestorage.app",
      messagingSenderId: "80873311127",
      appId: "1:80873311127:web:c59008f0242cf5123052d2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let dbData = { players: {}, teams: {} };
    let state = { screen: 'teamSelect', selectedTeam: null, activePlayerId: null, view: 'list' };

    const getCurrentMonth = () => new Date().toLocaleString('default', { month: 'long' });
    const getCurrentYear = () => new Date().getFullYear();

    function loadDb() {
      onValue(ref(db, 'players'), (snap) => { dbData.players = snap.val() || {}; render(); });
      onValue(ref(db, 'teams'), (snap) => { dbData.teams = snap.val() || {}; render(); });
    }

    async function updatePlayer(id, data) {
      await set(ref(db, `players/${id}`), { ...dbData.players[id], ...data });
    }

    function render() {
      const appEl = document.getElementById('app');
      if (!appEl) return;
      appEl.innerHTML = '';

      if (state.screen === 'teamSelect') {
        const teamList = Object.keys(dbData.teams);
        appEl.innerHTML = `
          <div class="flex flex-col items-center pt-10 px-4">
            <img src="https://i.ibb.co/s9vfBcCz/Ballers-BLogo-Final.png" class="w-24 mb-6">
            <h1 class="text-3xl font-black mb-10 italic uppercase tracking-tighter text-center">Select Squad</h1>
            <div class="flex flex-col gap-4">
              ${teamList.map(team => `
                <button onclick="window.selectTeam('${team}')" class="btn-main btn-gradient shadow-lg">${team}</button>
              `).join('')}
              <button onclick="window.addTeam()" class="btn-main btn-outline">+ Add New Team</button>
            </div>
          </div>
        `;
      }

      if (state.screen === 'roster') {
        const teamPlayers = Object.entries(dbData.players)
          .filter(([_, p]) => p.team === state.selectedTeam)
          .sort((a, b) => a[1].fullName.localeCompare(b[1].fullName));

        appEl.innerHTML = `
          <div class="max-w-md mx-auto p-4 w-full">
            <div class="flex justify-between items-center mb-6">
              <button onclick="window.goBackToTeams()" class="text-slate-500 text-xs font-bold uppercase">← Teams</button>
              <div class="text-center flex items-center justify-center">
                <h2 class="text-2xl font-black pantone-802c italic leading-none">${state.selectedTeam.toUpperCase()}</h2>
                <span onclick="window.manageTeamMenu('${state.selectedTeam}')" class="edit-pencil pantone-802c">✎</span>
              </div>
              <button onclick="window.quickAdd()" class="bg-white text-black px-4 py-1 rounded-full font-bold text-xs">+ ADD</button>
            </div>
            <div class="space-y-3">
              ${teamPlayers.map(([id, p]) => `
                <div class="player-card p-4 rounded-xl flex justify-between items-center">
                  <div class="flex-1 cursor-pointer" onclick="window.openDetails('${id}')">
                    <div class="font-bold text-lg">${p.fullName}</div>
                    <div class="text-[10px] text-slate-500 uppercase font-bold">#${p.jerseyNumber || '00'} • ${p.position || 'G'} • GR: ${p.grade || 'N/A'}</div>
                  </div>
                  <button onclick="window.openPayment('${id}')" class="px-4 py-2 rounded-lg font-black text-[10px] ${p.lastPaymentMonth === (getCurrentMonth() + ' ' + getCurrentYear()) ? 'bg-green-500/20 text-green-400' : 'bg-red-500 text-white'}">
                    ${p.lastPaymentMonth === (getCurrentMonth() + ' ' + getCurrentYear()) ? 'PAID' : 'UNPAID'}
                  </button>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      if (state.view === 'details' && state.activePlayerId) {
        const p = dbData.players[state.activePlayerId];
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/95 z-50 p-6 overflow-y-auto';
        modal.innerHTML = `
          <div class="max-w-sm mx-auto pb-20">
            <h2 class="text-2xl font-black mb-6 italic uppercase">Player Profile</h2>
            <div class="grid grid-cols-1 gap-4">
              <div><label class="text-[10px] text-slate-500 font-bold uppercase">Full Name</label><input id="det-name" value="${p.fullName || ''}" class="w-full bg-slate-900 p-3 rounded border border-slate-800"></div>
              <div class="flex gap-2">
                <div class="w-1/3"><label class="text-[10px] text-slate-500 font-bold uppercase">Jersey #</label><input id="det-num" value="${p.jerseyNumber || ''}" class="w-full bg-slate-900 p-3 rounded border border-slate-800"></div>
                <div class="w-1/3"><label class="text-[10px] text-slate-500 font-bold uppercase">Position</label><input id="det-pos" value="${p.position || ''}" class="w-full bg-slate-900 p-3 rounded border border-slate-800"></div>
                <div class="w-1/3"><label class="text-[10px] text-slate-500 font-bold uppercase">Grade</label><input id="det-grade" value="${p.grade || ''}" class="w-full bg-slate-900 p-3 rounded border border-slate-800"></div>
              </div>
              <div><label class="text-[10px] text-slate-500 font-bold uppercase">Birthdate</label><input id="det-dob" value="${p.birthdate || ''}" placeholder="MM/DD/YYYY" class="w-full bg-slate-900 p-3 rounded border border-slate-800"></div>
              <div><label class="text-[10px] text-slate-500 font-bold uppercase">Parent Name</label><input id="det-pname" value="${p.parentName || ''}" class="w-full bg-slate-900 p-3 rounded border border-slate-800"></div>
              <div><label class="text-[10px] text-slate-500 font-bold uppercase">Parent Email</label><input id="det-pemail" value="${p.parentEmail || ''}" class="w-full bg-slate-900 p-3 rounded border border-slate-800"></div>
              <div><label class="text-[10px] text-slate-500 font-bold uppercase">Parent Number</label><input id="det-pphone" value="${p.parentPhone || ''}" class="w-full bg-slate-900 p-3 rounded border border-slate-800"></div>
            </div>

            <div class="mt-8">
               <h3 class="text-xs font-bold text-slate-500 uppercase mb-3">Documents</h3>
               <div id="file-list" class="space-y-2 mb-4">
                 ${p.files ? Object.entries(p.files).map(([fid, f]) => `
                   <div class="flex justify-between bg-slate-800 p-2 rounded text-xs">
                     <span class="font-bold">${f.name}</span>
                     <button onclick="window.viewFile('${f.data}')" class="text-green-400">View</button>
                   </div>
                 `).join('') : '<p class="text-[10px] text-slate-700 italic">No files uploaded.</p>'}
               </div>
               <button onclick="document.getElementById('fileInput').click()" class="w-full py-3 border border-dashed border-slate-700 text-slate-400 text-xs font-bold rounded">+ UPLOAD FILE</button>
            </div>

            <div class="mt-8 space-y-3">
              <button onclick="window.saveDetails()" class="w-full py-4 bg-green-500 text-black font-black rounded-xl uppercase">SAVE CHANGES</button>
              <button onclick="window.closeModals()" class="w-full py-2 text-slate-500 font-bold uppercase text-xs">Cancel</button>
            </div>
          </div>
        `;
        appEl.appendChild(modal);
      }

      if (state.view === 'payment' && state.activePlayerId) {
        const p = dbData.players[state.activePlayerId];
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6';
        modal.innerHTML = `
          <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-xs text-center border border-slate-800 shadow-2xl">
            <h3 class="text-xl font-black mb-6 uppercase italic">${p.fullName}</h3>
            <div class="grid grid-cols-1 gap-3">
              <button onclick="window.markPaid()" class="py-4 btn-gradient rounded-xl font-black italic">MARK AS PAID</button>
              <button onclick="window.closeModals()" class="mt-4 text-slate-500 font-bold text-xs uppercase underline">Cancel</button>
            </div>
          </div>
        `;
        appEl.appendChild(modal);
      }
    }

    window.addTeam = async () => {
      const name = prompt("New Team Name:");
      if (name) await set(ref(db, `teams/${name}`), true);
    };

    window.manageTeamMenu = async (oldName) => {
      const action = prompt(`Type "RENAME" to change team name, or "DELETE" to remove ${oldName}:`);
      if (action && action.toUpperCase() === "RENAME") {
        const newName = prompt("Enter new name:");
        if (!newName || newName === oldName) return;
        await set(ref(db, `teams/${newName}`), true);
        const updates = {};
        Object.entries(dbData.players).forEach(([id, p]) => { if (p.team === oldName) updates[`players/${id}/team`] = newName; });
        if (Object.keys(updates).length > 0) await update(ref(db), updates);
        await remove(ref(db, `teams/${oldName}`));
        state.selectedTeam = newName;
      } else if (action && action.toUpperCase() === "DELETE") {
        if (confirm(`Are you sure you want to delete ${oldName}?`)) {
          await remove(ref(db, `teams/${oldName}`));
          window.goBackToTeams();
        }
      }
    };

    window.saveDetails = () => {
      const id = state.activePlayerId;
      updatePlayer(id, {
        fullName: document.getElementById('det-name').value,
        jerseyNumber: document.getElementById('det-num').value,
        position: document.getElementById('det-pos').value,
        grade: document.getElementById('det-grade').value,
        birthdate: document.getElementById('det-dob').value,
        parentName: document.getElementById('det-pname').value,
        parentEmail: document.getElementById('det-pemail').value,
        parentPhone: document.getElementById('det-pphone').value,
      });
      window.closeModals();
    };

    window.handleFileSelect = (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const fileName = prompt("Enter a name for this file (e.g., Physical, ID):");
      if (!fileName) return;

      const reader = new FileReader();
      reader.onload = async (e) => {
        const fileData = e.target.result;
        const fileId = 'file-' + Date.now();
        await set(ref(db, `players/${state.activePlayerId}/files/${fileId}`), { name: fileName, data: fileData });
      };
      reader.readAsDataURL(file);
    };

    window.viewFile = (data) => {
      const win = window.open();
      win.document.write(`<iframe src="${data}" frameborder="0" style="border:0; width:100%; height:100%;" allowfullscreen></iframe>`);
    };

    window.selectTeam = (t) => { state.selectedTeam = t; state.screen = 'roster'; render(); };
    window.goBackToTeams = () => { state.screen = 'teamSelect'; state.selectedTeam = null; render(); };
    window.quickAdd = () => {
      const name = prompt("Athlete Full Name:");
      if (name) updatePlayer('p-' + Date.now(), { fullName: name, team: state.selectedTeam, status: 'active' });
    };
    window.openDetails = (id) => { state.activePlayerId = id; state.view = 'details'; render(); };
    window.openPayment = (id) => { state.activePlayerId = id; state.view = 'payment'; render(); };
    window.closeModals = () => { state.view = 'list'; render(); };
    window.markPaid = () => {
      updatePlayer(state.activePlayerId, { lastPaymentMonth: `${getCurrentMonth()} ${getCurrentYear()}` });
      window.closeModals();
    };

    loadDb();
  </script>
</body>
</html>
