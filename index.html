<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sac Town Ballers Roster (Local)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --pantone-802c: #00FF6C; }
    .pantone-802c { color: var(--pantone-802c); }
    .bg-pantone-802c { background-color: var(--pantone-802c); }
    .hover-bg-pantone-802c:hover { background-color: #00e05a; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center">
  <div id="app" class="w-full h-full"></div>

  <script type="module">
    // ---------------- Global State ----------------
    const TEAMS = ['Jr. High', 'JV', 'Varsity'];
    const STORAGE_KEY = 'ballers_roster_data';
    
    let dbData = { players: [] };
    let state = { 
      screen: 'splash', 
      selectedTeam: null, 
      selectedPlayer: null, 
      showEditModal: false, 
      tempPlayer: null 
    };

    const placeholders = { 
      fullName: "Player Full Name", 
      jerseyNumber: "Jersey #", 
      jerseySize: "Size", 
      birthdate: "MM/DD/YYYY", 
      parentName: "Parent Name", 
      parentEmail: "Parent Email", 
      parentPhone: "Parent Phone" 
    };

    function uuid() { 
      return 'id-' + Math.random().toString(36).slice(2) + Date.now().toString(36); 
    }

    // ---------------- Local Storage Functions ----------------
    // Replaces Firebase get()
    function loadDb() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        dbData = JSON.parse(saved);
      } else {
        dbData = { players: [] };
      }
    }

    // Replaces Firebase set()
    function saveToLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(dbData));
    }

    async function savePlayer(player) {
      const index = dbData.players.findIndex(p => p.id === player.id);
      if (index !== -1) {
        // Update existing
        dbData.players[index] = player;
      } else {
        // Add new
        dbData.players.push(player);
      }
      
      // Filter out deleted players locally
      dbData.players = dbData.players.filter(p => p.status !== 'deleted');
      
      saveToLocal();
    }

    // ---------------- Render Function ----------------
    function render() {
      const appEl = document.getElementById('app');
      appEl.innerHTML = '';

      // --- Splash Screen ---
      if (state.screen === 'splash') {
        const div = document.createElement('div');
        div.className = 'flex flex-col items-center justify-center h-full';
        div.innerHTML = `
          <img src='https://i.ibb.co/s9vfBcCz/Ballers-BLogo-Final.png' alt='Ballers Logo' class='w-48 mb-4'/>
          <h1 class='text-2xl md:text-3xl font-semibold text-white mb-2'>Sac Town Ballers</h1>
          <h2 class='text-6xl md:text-8xl font-black pantone-802c'>Roster</h2>
        `;
        appEl.appendChild(div);
        setTimeout(() => { state.screen = 'teamSelect'; render(); }, 2000);
        return;
      }

      // --- Team Selection ---
      if (state.screen === 'teamSelect') {
        const div = document.createElement('div');
        div.className = 'flex flex-col items-center gap-6 mt-6';
        div.innerHTML = `<div class='text-white text-sm mb-4'>Select what team you'd like to edit</div>`;
        
        TEAMS.forEach(team => {
          const btn = document.createElement('button');
          btn.textContent = team;
          btn.className = 'w-48 px-8 py-4 rounded-2xl font-bold bg-pantone-802c hover-bg-pantone-802c text-slate-950 text-xl';
          btn.onclick = () => { state.selectedTeam = team; state.screen = 'roster'; render(); };
          div.appendChild(btn);
        });
        appEl.appendChild(div);
        return;
      }

      // --- Roster Page ---
      if (state.screen === 'roster') {
        const div = document.createElement('div');
        div.className = 'max-w-xl mx-auto mt-6 px-4';
        
        const header = document.createElement('div');
        header.className = 'flex justify-between mb-4 items-center gap-4';
        
        header.innerHTML = `
          <button id="backBtn" class="px-4 py-2 rounded bg-slate-700 text-white font-semibold">Back</button>
          <h2 class="text-2xl font-bold">${state.selectedTeam} Roster</h2>
          <button id="addBtn" class="px-4 py-2 rounded bg-pantone-802c text-slate-950 font-semibold">Add</button>
        `;
        div.appendChild(header);

        header.querySelector('#backBtn').onclick = () => { state.screen = 'teamSelect'; render(); };
        header.querySelector('#addBtn').onclick = () => { 
          state.tempPlayer = { id: uuid(), team: state.selectedTeam, fullName: '', jerseyNumber: '', jerseySize: '', birthdate: '', parentName: '', parentEmail: '', parentPhone: '', status: 'active', removalReason: null }; 
          state.showEditModal = true; 
          render(); 
        };

        // Player Lists
        const activePlayers = dbData.players.filter(p => p.team === state.selectedTeam && p.status === 'active');
        activePlayers.forEach(p => {
          const pDiv = document.createElement('div');
          pDiv.className = 'cursor-pointer px-3 py-3 border-b border-slate-700 flex justify-between';
          pDiv.innerHTML = `<span>${p.fullName}</span> <span class="text-slate-500">#${p.jerseyNumber || '--'}</span>`;
          pDiv.onclick = () => { state.selectedPlayer = p; state.tempPlayer = { ...p }; state.showEditModal = true; render(); };
          div.appendChild(pDiv);
        });

        appEl.appendChild(div);
      }

      // --- Edit Modal ---
      if (state.showEditModal) {
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4';
        const content = document.createElement('div');
        content.className = 'bg-slate-900 p-6 rounded-2xl max-w-md w-full flex flex-col gap-3';

        Object.keys(placeholders).forEach(key => {
          const input = document.createElement('input');
          input.placeholder = placeholders[key];
          input.value = state.tempPlayer[key] || '';
          input.className = 'p-3 rounded bg-slate-800 text-white border border-slate-700 w-full focus:outline-none focus:border-pantone-802c';
          input.oninput = (e) => { state.tempPlayer[key] = e.target.value; };
          content.appendChild(input);
        });

        const actionBtns = document.createElement('div');
        actionBtns.className = 'flex flex-col gap-2 mt-4';
        
        const saveBtn = document.createElement('button');
        saveBtn.textContent = 'Save Player';
        saveBtn.className = 'w-full py-3 bg-pantone-802c text-slate-950 rounded-xl font-bold';
        saveBtn.onclick = async () => {
          if (!state.tempPlayer.fullName.trim()) return alert("Name required");
          await savePlayer(state.tempPlayer);
          state.showEditModal = false;
          render();
        };

        const closeBtn = document.createElement('button');
        closeBtn.textContent = 'Cancel';
        closeBtn.className = 'w-full py-3 bg-slate-700 text-white rounded-xl font-bold';
        closeBtn.onclick = () => { state.showEditModal = false; render(); };

        const delBtn = document.createElement('button');
        delBtn.textContent = 'Delete Player';
        delBtn.className = 'w-full py-3 text-red-500 text-sm font-semibold';
        delBtn.onclick = () => {
          if(confirm("Permanently remove this player?")) {
            state.tempPlayer.status = 'deleted';
            savePlayer(state.tempPlayer);
            state.showEditModal = false;
            render();
          }
        };

        actionBtns.append(saveBtn, closeBtn, delBtn);
        content.appendChild(actionBtns);
        modal.appendChild(content);
        appEl.appendChild(modal);
      }
    }

    // ---------------- Main ----------------
    loadDb();
    render();
  </script>
</body>
</html>
