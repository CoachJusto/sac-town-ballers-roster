<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ballers Roster & Fees</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --pantone-802c: #00FF6C; }
    .pantone-802c { color: var(--pantone-802c); }
    body, html { background-color: #020617 !important; margin: 0; padding: 0; min-height: 100vh; color: white; font-family: sans-serif; }
    #app { background-color: #020617 !important; min-height: 100vh; }
    
    .btn-gradient { 
      background: linear-gradient(135deg, #38ff14 0%, #028e3a 100%); 
      box-shadow: 0 4px 15px rgba(56, 255, 20, 0.2);
    }
    
    .player-card { background: #0f172a; border: 1px solid #1e293b; transition: all 0.2s; }
    .greyed-out { opacity: 0.4; filter: grayscale(1); }
    .team-action-btn { background: rgba(30, 41, 59, 0.8); color: white; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 14px; position: absolute; border: 1px solid #334155; }
    .delete-pos { right: -10px; top: -10px; color: #ff4d4d; }
    .edit-pos { left: -10px; top: -10px; color: #38ff14; }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen flex flex-col items-center justify-center">
    <p class="text-slate-600 animate-pulse uppercase tracking-widest text-xs font-bold">Syncing Ballers Cloud...</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRlFQLj41BR_59Pjh3WDPpDjDxCnf4AXs",
      authDomain: "sac-town-ballers-roster.firebaseapp.com",
      databaseURL: "https://sac-town-ballers-roster-default-rtdb.firebaseio.com/",
      projectId: "sac-town-ballers-roster",
      storageBucket: "sac-town-ballers-roster.firebasestorage.app",
      messagingSenderId: "80873311127",
      appId: "1:80873311127:web:c59008f0242cf5123052d2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let dbData = { players: {}, teams: {} };
    let state = { screen: 'teamSelect', selectedTeam: null, activePlayerId: null, view: 'list' };

    const getCurrentMonth = () => new Date().toLocaleString('default', { month: 'long' });
    const getCurrentYear = () => new Date().getFullYear();

    function loadDb() {
      onValue(ref(db, 'players'), (snap) => {
        dbData.players = snap.val() || {};
        render();
      });
      onValue(ref(db, 'teams'), (snap) => {
        dbData.teams = snap.val() || {};
        render();
      });
    }

    async function updatePlayer(id, data) {
      await set(ref(db, `players/${id}`), { ...dbData.players[id], ...data });
    }

    function getRosterSize(teamName) {
      return Object.values(dbData.players).filter(p => p.team === teamName && p.status === 'active').length;
    }

    function render() {
      const appEl = document.getElementById('app');
      if (!appEl) return;
      appEl.innerHTML = '';
      appEl.className = "min-h-screen pb-10";

      // --- SCREEN: TEAM SELECTION ---
      if (state.screen === 'teamSelect') {
        const teamList = Object.keys(dbData.teams).length > 0 ? Object.keys(dbData.teams) : ['Jr. High', 'JV', 'Varsity'];
        
        appEl.innerHTML = `
          <div class="flex flex-col items-center pt-10 px-4">
            <img src="https://i.ibb.co/s9vfBcCz/Ballers-BLogo-Final.png" class="w-24 mb-6">
            <h1 class="text-3xl font-black mb-10 italic uppercase tracking-tighter">Select Squad</h1>
            <div class="space-y-8">
              ${teamList.map(team => `
                <div class="relative group">
                  <button onclick="window.editTeam('${team}')" class="team-action-btn edit-pos shadow-lg">✎</button>
                  <button onclick="window.selectTeam('${team}')" class="btn-gradient w-72 py-6 text-black font-black text-2xl rounded-2xl active:scale-95 transition-transform uppercase italic">${team}</button>
                  <button onclick="window.removeTeam('${team}')" class="team-action-btn delete-pos shadow-lg">×</button>
                </div>
              `).join('')}
            </div>
            <button onclick="window.addTeam()" class="mt-12 border-2 border-dashed border-slate-700 text-slate-500 w-72 py-4 rounded-2xl font-bold uppercase hover:border-green-500 hover:text-green-500 transition-colors">+ Add New Team</button>
          </div>
        `;
      }

      // --- SCREEN: ROSTER LIST ---
      if (state.screen === 'roster') {
        const teamPlayers = Object.entries(dbData.players)
          .filter(([_, p]) => p.team === state.selectedTeam)
          .sort((a, b) => a[1].fullName.localeCompare(b[1].fullName));

        appEl.innerHTML = `
          <div class="max-w-md mx-auto p-4">
            <div class="flex justify-between items-start mb-6">
              <button onclick="window.goBackToTeams()" class="text-slate-500 text-sm font-bold uppercase tracking-tight mt-1">← Teams</button>
              <div class="text-center">
                <h2 class="text-3xl font-black pantone-802c italic leading-none">${state.selectedTeam.toUpperCase()}</h2>
                <p class="text-[10px] font-bold text-slate-500 mt-1 tracking-[0.2em] uppercase">Roster Size: ${getRosterSize(state.selectedTeam)}</p>
              </div>
              <button onclick="window.quickAdd()" class="bg-white text-black px-4 py-1 rounded-full font-bold text-xs mt-1">+ ADD</button>
            </div>
            <div class="space-y-3">
              ${teamPlayers.length > 0 ? teamPlayers.map(([id, p]) => {
                const currentPeriod = `${getCurrentMonth()} ${getCurrentYear()}`;
                const isPaid = p.lastPaymentMonth === currentPeriod;
                return `
                  <div class="player-card p-4 rounded-xl flex justify-between items-center ${p.status === 'inactive' ? 'greyed-out' : ''}">
                    <div class="flex-1 cursor-pointer" onclick="window.openDetails('${id}')">
                      <div class="font-bold text-lg">${p.fullName}</div>
                      <div class="text-[10px] text-slate-500 uppercase font-bold">${p.jerseyNumber ? '#'+p.jerseyNumber : 'No #'} • ${p.grade || 'No Grade'}</div>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                      <p class="text-[8px] font-bold text-slate-500 uppercase tracking-tighter">${getCurrentMonth().toUpperCase()}'S FEE</p>
                      <button onclick="window.openPayment('${id}')" class="px-4 py-1.5 rounded-lg font-black text-[10px] ${isPaid ? 'bg-green-500/20 text-green-400' : 'bg-red-500 text-white animate-pulse'}">
                        ${isPaid ? 'PAID' : 'UNPAID'}
                      </button>
                    </div>
                  </div>
                `;
              }).join('') : '<p class="text-center text-slate-600 py-10 italic">No players in this squad yet.</p>'}
            </div>
          </div>
        `;
      }

      // (Modals for details and payment remain the same...)
      if (state.view === 'details' && state.activePlayerId) {
        const p = dbData.players[state.activePlayerId];
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/95 z-50 p-6 overflow-y-auto';
        modal.innerHTML = `
          <div class="max-w-sm mx-auto">
            <h2 class="text-2xl font-black mb-6 italic uppercase">Player Profile</h2>
            <div class="space-y-4">
              <div><label class="text-[10px] text-slate-500 font-bold ml-1 uppercase">Full Name</label><input id="det-name" value="${p.fullName}" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 text-white font-bold"></div>
              <div class="flex gap-4">
                <div class="flex-1"><label class="text-[10px] text-slate-500 font-bold ml-1 uppercase">Jersey #</label><input id="det-num" value="${p.jerseyNumber || ''}" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 text-white font-bold"></div>
                <div class="flex-1"><label class="text-[10px] text-slate-500 font-bold ml-1 uppercase">Grade</label><input id="det-grade" value="${p.grade || ''}" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 text-white font-bold"></div>
              </div>
            </div>
            <div class="mt-8 space-y-3">
              <button onclick="window.saveDetails()" class="w-full py-4 bg-green-500 text-black font-black rounded-xl uppercase tracking-widest">SAVE CHANGES</button>
              <button onclick="window.closeModals()" class="w-full py-2 text-slate-500 font-bold uppercase text-xs">Close</button>
            </div>
          </div>
        `;
        appEl.appendChild(modal);
      }

      if (state.view === 'payment' && state.activePlayerId) {
        const p = dbData.players[state.activePlayerId];
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6';
        modal.innerHTML = `
          <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-xs text-center border border-slate-800 shadow-2xl">
            <h3 class="text-xl font-black mb-2">${p.fullName}</h3>
            <div class="grid grid-cols-2 gap-3 mt-4">
              <button onclick="window.markPaid('Venmo')" class="py-4 bg-[#3d95ce] rounded-xl font-bold text-xs">VENMO</button>
              <button onclick="window.markPaid('CashApp')" class="py-4 bg-[#00d35c] rounded-xl font-bold text-xs">CASHAPP</button>
              <button onclick="window.markPaid('Apple Pay')" class="py-4 bg-white text-black rounded-xl font-bold text-xs">APPLE</button>
              <button onclick="window.markPaid('Cash')" class="py-4 bg-slate-700 rounded-xl font-bold text-xs text-green-400">CASH</button>
            </div>
            <button onclick="window.closeModals()" class="mt-6 text-slate-500 font-bold text-[10px] uppercase underline">Cancel</button>
          </div>
        `;
        appEl.appendChild(modal);
      }
    }

    // --- Team Management Logic ---
    window.addTeam = async () => {
      const teamName = prompt("Enter new team name:");
      if (teamName) await set(ref(db, `teams/${teamName}`), true);
    };

    window.editTeam = async (oldName) => {
      const newName = prompt(`Rename "${oldName}" to:`, oldName);
      if (!newName || newName === oldName) return;

      // 1. Create the new team node
      await set(ref(db, `teams/${newName}`), true);

      // 2. Find all players on the old team and update them
      const updates = {};
      Object.entries(dbData.players).forEach(([id, p]) => {
        if (p.team === oldName) {
          updates[`players/${id}/team`] = newName;
        }
      });
      
      if (Object.keys(updates).length > 0) {
        await update(ref(db), updates);
      }

      // 3. Remove the old team node
      await remove(ref(db, `teams/${oldName}`));
    };

    window.removeTeam = async (teamName) => {
      if (confirm(`Delete "${teamName}"? Players will remain in the database but will be "team-less".`)) {
        await remove(ref(db, `teams/${teamName}`));
      }
    };

    // --- Global Logic ---
    window.selectTeam = (team) => { state.selectedTeam = team; state.screen = 'roster'; render(); };
    window.goBackToTeams = () => { state.screen = 'teamSelect'; state.selectedTeam = null; render(); };
    window.quickAdd = () => {
      const name = prompt("Enter athlete's full name:");
      if (name) updatePlayer('p-' + Date.now(), { fullName: name, team: state.selectedTeam, status: 'active' });
    };
    window.openDetails = (id) => { state.activePlayerId = id; state.view = 'details'; render(); };
    window.openPayment = (id) => { state.activePlayerId = id; state.view = 'payment'; render(); };
    window.closeModals = () => { state.view = 'list'; render(); };
    window.saveDetails = () => {
      updatePlayer(state.activePlayerId, {
        fullName: document.getElementById('det-name').value,
        jerseyNumber: document.getElementById('det-num').value,
        grade: document.getElementById('det-grade').value
      });
      window.closeModals();
    };
    window.markPaid = (method) => {
      updatePlayer(state.activePlayerId, { lastPaymentMonth: `${getCurrentMonth()} ${getCurrentYear()}`, paymentMethod: method });
      window.closeModals();
    };

    document.addEventListener('DOMContentLoaded', () => {
      render();
      loadDb();
    });
  </script>
</body>
</html>
