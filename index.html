<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ballers Manager Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    body, html { background-color: #020617; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; margin: 0; font-size: 18px; }
    #app { height: 100%; display: flex; flex-direction: column; }
    .btn-main { width: 280px; padding: 1.25rem; border-radius: 1rem; text-transform: uppercase; font-style: italic; font-weight: 900; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; letter-spacing: 0.05em; position: relative; }
    .btn-gradient { background: linear-gradient(135deg, #38ff14 0%, #028e3a 100%); color: black; }
    .btn-outline { border: 2px dashed #334155; color: #94a3b8; }
    .btn-alert { background: #22c55e; color: black; border: none; }
    .notif-badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; font-size: 12px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #020617; }
    .player-card { background: #0f172a; border: 1px solid #1e293b; padding: 0.6rem 1rem; border-radius: 0.75rem; margin-bottom: 0.4rem; cursor: pointer; }
    .profile-modal { background: #0f172a; border: 2px solid #334155; width: 92%; max-width: 400px; border-radius: 1.5rem; padding: 1.5rem; position: relative; max-height: 90vh; overflow-y: auto; }
    input, select { background: #1e293b !important; border: 1px solid #475569 !important; color: white !important; padding: 0.5rem 0.75rem !important; border-radius: 0.5rem !important; width: 100%; height: 2.8rem; font-size: 1rem; }
    label { font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 2px; display: block; letter-spacing: 0.05em; }
    .pay-sub { font-size: 9px; font-weight: 900; text-transform: uppercase; margin-top: 2px; }
    @keyframes blink-red { 0%, 100% { background: #ef4444; } 50% { background: #7f1d1d; } }
    .animate-blink { animation: blink-red 1s infinite; }
    .menu-btn { width: 100%; padding: 1rem; background: #1e293b; border-radius: 0.75rem; font-weight: 900; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 0.5rem; }
    .search-container { position: relative; margin-bottom: 1rem; }
    .search-input { padding-left: 2.5rem !important; border-radius: 2rem !important; background: rgba(30, 41, 59, 0.5) !important; border-color: #334155 !important; }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 1.2rem; pointer-events: none; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBRlFQLj41BR_59Pjh3WDPpDjDxCnf4AXs",
      authDomain: "sac-town-ballers-roster.firebaseapp.com",
      databaseURL: "https://sac-town-ballers-roster-default-rtdb.firebaseio.com/",
      projectId: "sac-town-ballers-roster",
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dbData = { players: {}, teams: {} };
    let state = { screen: 'main', selectedTeam: null, searchQuery: '', pendingTryouts: 0 };

    // Initial Load & Daily Check
    db.ref('/').on('value', (snap) => {
      const data = snap.val() || {};
      dbData.players = data.players || {};
      dbData.teams = data.teams || { "JV": true, "Varsity": true };
      if (state.screen === 'main') checkForNewSignups();
      render();
    });

    async function checkForNewSignups() {
      const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStWiziLmn7ZOT7DZT7ak_E4XDLsl4g3yEBqeDARSz7LC6NoFj4GfpKSBjrKtKUkxSsvEegywlD6Rd5/pub?gid=1820988393&single=true&output=csv";
      try {
        const res = await fetch(csvUrl);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        const existingNames = Object.values(dbData.players).map(p => p.fullName.toLowerCase().trim());
        
        let count = 0;
        rows.forEach(row => {
          const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          const athleteName = c[5]?.replace(/"/g, '').trim();
          if (athleteName && !existingNames.includes(athleteName.toLowerCase())) {
            count++;
          }
        });
        state.pendingTryouts = count;
        render();
      } catch (e) { console.warn("Background check failed"); }
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = '';

      if (state.screen === 'main') {
        const teams = Object.keys(dbData.teams);
        app.innerHTML = `
          <div class="flex flex-col items-center pt-12 px-4 w-full relative h-full">
            <button onclick="addTeam()" class="absolute top-4 right-4 text-white text-[12px] font-bold bg-white/10 px-4 py-2 rounded">+ TEAM</button>
            <img src="https://i.ibb.co/s9vfBcCz/Ballers-BLogo-Final.png" class="w-24 mb-10">
            <div class="flex flex-col gap-4 overflow-y-auto pb-10">
              ${teams.map(t => `<button onclick="go('${t}')" class="btn-main btn-gradient">${t}</button>`).join('')}
              <button onclick="go('Tryouts')" class="btn-main ${state.pendingTryouts > 0 ? 'btn-alert' : 'btn-outline'}">
                TRYOUTS
                ${state.pendingTryouts > 0 ? `<div class="notif-badge">${state.pendingTryouts}</div>` : ''}
              </button>
              <button onclick="go('Unrostered')" class="mt-4 text-[12px] font-bold text-slate-500 uppercase tracking-widest self-center">View Unrostered List</button>
            </div>
          </div>
        `;
      } else {
        const isT = state.selectedTeam === 'Tryouts';
        const isU = state.selectedTeam === 'Unrostered';
        
        const list = Object.entries(dbData.players)
          .filter(([id, p]) => {
            const matchesTeam = p.team === state.selectedTeam;
            const matchesSearch = (p.fullName || "").toLowerCase().includes(state.searchQuery.toLowerCase());
            return matchesTeam && matchesSearch;
          })
          .sort((a, b) => isT ? new Date(b[1].signUpDate || 0) - new Date(a[1].signUpDate || 0) : (a[1].fullName || "").localeCompare(b[1].fullName || ""));

        const headerTitle = (isT || isU) ? state.selectedTeam : `${state.selectedTeam}'S ROSTER`;

        app.innerHTML = `
          <div class="p-5 flex flex-col h-full">
            <div class="flex justify-between items-center mb-4">
              <button onclick="goBack()" class="text-slate-400 text-[11px] font-black uppercase">← Back</button>
              <div class="text-center">
                <h2 class="text-xl font-black italic uppercase leading-none">${headerTitle}</h2>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">${list.length} Players</p>
              </div>
              <div class="flex gap-2">
                ${isT ? `<button onclick="confirmClear()" class="text-red-500 text-[10px] font-black">CLEAR</button>` : ''}
                ${isT ? `<button onclick="syncSheet()" class="text-green-400 text-[10px] font-black uppercase">Sync</button>` : '<div class="w-8"></div>'}
              </div>
            </div>

            <div class="search-container">
              <span class="search-icon">🔍</span>
              <input type="text" placeholder="Search player..." class="search-input" value="${state.searchQuery}" oninput="updateSearch(this.value)">
            </div>
            
            <div class="flex-1 overflow-y-auto space-y-1 pb-24">
              ${list.map(([id, p]) => `
                <div class="player-card flex justify-between items-center" onclick="openProfile('${id}')">
                  <div class="flex-1">
                    <div class="font-black uppercase text-[16px] leading-tight">${p.fullName}</div>
                    <div class="text-[10px] text-slate-400 font-bold uppercase">
                      ${isT ? `DIV: ${p.grade || 'N/A'} • EXP: ${p.experience || 'N/A'}` : `#${p.jersey || '00'} • ${p.pos || 'POS'}`}
                    </div>
                  </div>
                  ${(!isT) ? `
                    <button onclick="event.stopPropagation();showPayModal('${id}')" 
                            class="flex flex-col items-center justify-center min-w-[85px] h-10 rounded-lg ${p.paid ? 'bg-green-500/20 text-green-400' : 'animate-blink text-white font-black'}">
                      <span class="text-[10px] font-black">${p.paid ? 'PAID' : 'UNPAID'}</span>
                      ${p.paidMethod ? `<span class="pay-sub text-[7px]">VIA ${p.paidMethod}</span>` : ''}
                    </button>
                  ` : ''}
                </div>
              `).join('')}
            </div>

            ${!isT ? `
              <div class="fixed bottom-6 left-0 right-0 px-5">
                <button onclick="showManualAdd()" class="w-full py-4 bg-white text-black font-black uppercase italic rounded-xl shadow-2xl">+ ADD PLAYER</button>
              </div>
            ` : ''}
          </div>
        `;
      }
    }

    window.updateSearch = (val) => {
      state.searchQuery = val;
      render();
      const input = document.querySelector('.search-input');
      if(input) { input.focus(); input.setSelectionRange(val.length, val.length); }
    };

    window.showManualAdd = () => {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-[200]';
      modal.innerHTML = `
        <div class="profile-modal">
          <p class="text-white font-black uppercase italic mb-6">Add to ${state.selectedTeam}</p>
          <div class="space-y-4 mb-8">
            <div><label>Player Name</label><input id="add-name"></div>
            <div class="grid grid-cols-2 gap-4">
              <div><label>Jersey #</label><input id="add-jersey" placeholder="00"></div>
              <div><label>Position</label><select id="add-pos"><option>PG</option><option>SG</option><option>SF</option><option>PF</option><option>C</option></select></div>
            </div>
          </div>
          <div class="flex gap-3">
            <button onclick="this.closest('.fixed').remove()" class="flex-1 py-4 bg-slate-800 text-[12px] font-black uppercase rounded-xl">Cancel</button>
            <button onclick="submitManualAdd()" class="flex-1 py-4 bg-green-500 text-black text-[12px] font-black uppercase rounded-xl">Add</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    };

    window.submitManualAdd = () => {
      const name = document.getElementById('add-name').value;
      if(!name) return alert("Name required");
      db.ref('players').push({
        fullName: name,
        jersey: document.getElementById('add-jersey').value || '00',
        pos: document.getElementById('add-pos').value,
        team: state.selectedTeam,
        paid: false,
        signUpDate: new Date().toISOString()
      });
      document.querySelectorAll('.fixed').forEach(m => m.remove());
    };

    window.goBack = () => { state.screen = 'main'; state.searchQuery = ''; render(); };
    window.go = (t) => { state.selectedTeam = t; state.screen = 'roster'; state.searchQuery = ''; render(); };

    window.openProfile = (id) => {
      const p = dbData.players[id];
      if(!p) return;
      const isTryout = p.team === 'Tryouts';
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-[100]';
      
      if (isTryout) {
        modal.innerHTML = `
          <div class="profile-modal">
            <div class="flex justify-between items-start mb-6 border-b border-slate-800 pb-4">
              <div class="font-black uppercase text-2xl italic leading-none">${p.fullName}</div>
              <button onclick="showTeamPicker('${id}')" class="text-[10px] font-black bg-white text-black px-4 py-2 rounded animate-blink">MIGRATE</button>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-8">
              <div><label>Age</label><input value="${p.age || 'N/A'}" disabled class="opacity-50"></div>
              <div><label>Division</label><input id="edit-grade" value="${p.grade || ''}"></div>
              <div class="col-span-2"><label>Experience</label><input id="edit-exp" value="${p.experience || ''}"></div>
            </div>
            <div class="flex gap-3">
              <button onclick="this.closest('.fixed').remove()" class="flex-1 py-4 bg-slate-800 text-[12px] font-black uppercase rounded-xl">Cancel</button>
              <button onclick="saveChanges('${id}')" class="flex-1 py-4 bg-green-500 text-black text-[12px] font-black uppercase rounded-xl">Save</button>
            </div>
          </div>
        `;
      } else {
        modal.innerHTML = `
          <div class="profile-modal">
            <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
              <div class="font-black uppercase text-2xl italic leading-none">${p.fullName}</div>
              <button onclick="showActiveMigrateMenu('${id}')" class="text-2xl text-slate-400">⇄</button>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6">
              <div><label>Jersey #</label><input id="edit-jersey" value="${p.jersey || ''}" placeholder="00"></div>
              <div><label>Position</label><select id="edit-pos"><option value="PG" ${p.pos==='PG'?'selected':''}>PG</option><option value="SG" ${p.pos==='SG'?'selected':''}>SG</option><option value="SF" ${p.pos==='SF'?'selected':''}>SF</option><option value="PF" ${p.pos==='PF'?'selected':''}>PF</option><option value="C" ${p.pos==='C'?'selected':''}>C</option></select></div>
            </div>
            <div class="space-y-4 mb-6">
              <div><label>Parent/Guardian</label><input id="edit-parent" value="${p.parent || ''}"></div>
              <div><label>Phone</label><input id="edit-phone" value="${p.phone || ''}"></div>
              <div><label>Email</label><input id="edit-email" value="${p.email || ''}"></div>
            </div>
            <div class="flex gap-3">
              <button onclick="this.closest('.fixed').remove()" class="flex-1 py-4 bg-slate-800 text-[12px] font-black uppercase rounded-xl">Cancel</button>
              <button onclick="saveChanges('${id}')" class="flex-1 py-4 bg-green-500 text-black text-[12px] font-black uppercase rounded-xl">Save</button>
            </div>
          </div>
        `;
      }
      document.body.appendChild(modal);
    };

    window.showActiveMigrateMenu = (id) => {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-[200]';
      modal.innerHTML = `
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-xs text-center border border-slate-800">
          <p class="text-white font-black uppercase italic mb-8">Manage Player</p>
          <button onclick="showTeamPicker('${id}')" class="menu-btn bg-slate-800 text-white">Change Team</button>
          <button onclick="doMove('${id}', 'Unrostered')" class="menu-btn bg-red-900/40 text-red-400 border border-red-900/50">Remove</button>
          <button onclick="this.closest('.fixed').remove()" class="mt-4 text-slate-500 font-bold uppercase text-[11px]">Cancel</button>
        </div>
      `;
      document.body.appendChild(modal);
    };

    window.showTeamPicker = (playerId) => {
      const teams = Object.keys(dbData.teams);
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-[300]';
      modal.innerHTML = `
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-xs text-center border border-slate-800">
          <p class="text-white font-black uppercase italic mb-8">Select Team</p>
          <div class="space-y-3">
            ${teams.map(t => `<button onclick="doMove('${playerId}', '${t}')" class="menu-btn bg-slate-800 text-white">${t}</button>`).join('')}
            <button onclick="doMove('${playerId}', 'Unrostered')" class="menu-btn bg-slate-800/50 text-slate-400">Move to Unrostered</button>
            <button onclick="this.closest('.fixed').remove()" class="mt-4 text-slate-500 font-bold uppercase text-[11px]">Cancel</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    };

    window.showPayModal = (id) => {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-[200]';
      const methods = ['CASHAPP', 'VENMO', 'CREDIT CARD', 'OTHER'];
      modal.innerHTML = `
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-xs text-center border border-slate-800">
          <p class="text-white font-black uppercase italic mb-8">Payment Method</p>
          <div class="space-y-3">
            ${methods.map(m => `<button onclick="confirmPay('${id}', '${m}')" class="menu-btn bg-slate-800 text-white">${m}</button>`).join('')}
            <button onclick="this.closest('.fixed').remove()" class="mt-4 text-slate-500 font-bold uppercase text-[11px]">Cancel</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    };

    window.saveChanges = (id) => {
      const updates = {};
      ['edit-grade', 'edit-exp', 'edit-jersey', 'edit-pos', 'edit-parent', 'edit-phone', 'edit-email'].forEach(f => {
        const el = document.getElementById(f);
        if(el) updates[f.replace('edit-', '')] = el.value;
      });
      db.ref(`players/${id}`).update(updates);
      document.querySelectorAll('.fixed').forEach(m => m.remove());
    };

    window.confirmPay = (id, method) => {
      db.ref(`players/${id}`).update({ paid: true, paidMethod: method });
      document.querySelectorAll('.fixed').forEach(m => m.remove());
    };

    window.doMove = (id, team) => {
      db.ref(`players/${id}`).update({ team: team });
      document.querySelectorAll('.fixed').forEach(m => m.remove());
    };

    window.addTeam = () => {
      const name = prompt("New Team Name:");
      if(name) db.ref(`teams/${name}`).set(true);
    };

    window.confirmClear = () => {
      if(confirm("Delete ALL tryout data?")) {
        Object.entries(dbData.players).forEach(([id, p]) => {
          if(p.team === 'Tryouts') db.ref(`players/${id}`).remove();
        });
      }
    };

    window.syncSheet = async () => {
      const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStWiziLmn7ZOT7DZT7ak_E4XDLsl4g3yEBqeDARSz7LC6NoFj4GfpKSBjrKtKUkxSsvEegywlD6Rd5/pub?gid=1820988393&single=true&output=csv";
      try {
        const res = await fetch(csvUrl);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        const existingNames = Object.values(dbData.players).map(p => p.fullName.toLowerCase().trim());
        
        rows.forEach(row => {
          const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          const athleteName = c[5]?.replace(/"/g, '').trim();
          if (athleteName && !existingNames.includes(athleteName.toLowerCase())) {
            db.ref('players').push({
              fullName: athleteName,
              signUpDate: c[0]?.replace(/"/g, '') || new Date().toISOString(),
              parent: c[1]?.replace(/"/g, '') || 'N/A',
              phone: c[2]?.replace(/"/g, '') || 'N/A',
              email: c[3]?.replace(/"/g, '') || 'N/A',
              age: c[6]?.replace(/"/g, '') || 'N/A',
              experience: c[7]?.replace(/"/g, '') || 'None',
              grade: c[9]?.replace(/"/g, '') || 'N/A',
              team: 'Tryouts',
              paid: false
            });
          }
        });
        state.pendingTryouts = 0;
        alert("Sync Complete!");
      } catch (e) { alert("Sync error"); }
    };
  </script>
</body>
</html>
