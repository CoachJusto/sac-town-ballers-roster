<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ballers Manager Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --pantone-802c: #00FF6C; }
    body, html { background-color: #020617; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; margin: 0; }
    #app { height: 100%; display: flex; flex-direction: column; }
    
    .btn-main { width: 240px; padding: 1rem; border-radius: 0.75rem; text-transform: uppercase; font-style: italic; font-weight: 900; display: flex; align-items: center; justify-content: center; }
    .btn-gradient { background: linear-gradient(135deg, #38ff14 0%, #028e3a 100%); color: black; }
    .btn-outline { border: 2px dashed #1e293b; color: #475569; }
    .player-card { background: #0f172a; border: 1px solid #1e293b; padding: 0.6rem; border-radius: 0.5rem; }
    
    /* Ultra-Condensed Profile Styling */
    .profile-modal { background: #0f172a; border: 1px solid #1e293b; width: 90%; max-width: 350px; border-radius: 1rem; padding: 1rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; padding: 0.2rem 0.4rem !important; border-radius: 0.2rem !important; font-size: 0.7rem !important; height: 1.5rem !important; width: 100%; }
    label { font-size: 0.55rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 1px; display: block; }
    
    @keyframes blink-red { 0%, 100% { background: #ef4444; } 50% { background: #7f1d1d; } }
    .animate-blink { animation: blink-red 1s infinite; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRlFQLj41BR_59Pjh3WDPpDjDxCnf4AXs",
      authDomain: "sac-town-ballers-roster.firebaseapp.com",
      databaseURL: "https://sac-town-ballers-roster-default-rtdb.firebaseio.com/",
      projectId: "sac-town-ballers-roster",
    };

    const fb = initializeApp(firebaseConfig);
    const db = getDatabase(fb);
    let dbData = { players: {}, teams: {} };
    let state = { screen: 'main', selectedTeam: null };

    const calcAge = (dob) => {
        if(!dob) return "N/A";
        const birth = new Date(dob);
        const diff = Date.now() - birth.getTime();
        return Math.abs(new Date(diff).getUTCFullYear() - 1970);
    };

    function init() {
      onValue(ref(db, '/'), (snap) => {
        const data = snap.val() || {};
        dbData.players = data.players || {};
        dbData.teams = data.teams || { "JV": true, "Varsity": true };
        render();
      });
    }

    async function executeSync() {
      const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStWiziLmn7ZOT7DZT7ak_E4XDLsl4g3yEBqeDARSz7LC6NoFj4GfpKSBjrKtKUkxSsvEegywlD6Rd5/pub?gid=1820988393&single=true&output=csv";
      try {
        const res = await fetch(csvUrl);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        const allExistingNames = Object.values(dbData.players).map(p => p.fullName.toLowerCase().trim());
        
        rows.forEach(row => {
          const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          const name = c[5]?.replace(/"/g, '').trim(); 
          if (name && !allExistingNames.includes(name.toLowerCase())) {
            const id = 'p-' + Date.now() + Math.floor(Math.random()*1000);
            set(ref(db, `players/${id}`), {
              fullName: name,
              signUpDate: c[0]?.replace(/"/g, '') || '',
              age: c[6]?.replace(/"/g, '') || 'N/A', 
              experience: c[7]?.replace(/"/g, '') || 'None', 
              grade: c[9]?.replace(/"/g, '') || 'N/A', 
              team: 'Tryouts',
              detailsLocked: true
            });
          }
        });
      } catch (e) { console.error("Sync Error"); }
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = '';

      if (state.screen === 'main') {
        const teams = Object.keys(dbData.teams);
        app.innerHTML = `
          <div class="flex flex-col items-center pt-12 px-4 w-full relative">
            <button onclick="addTeam()" class="absolute top-4 right-4 text-white text-[10px] font-bold bg-white/10 px-3 py-1 rounded">+ TEAM</button>
            <img src="https://i.ibb.co/s9vfBcCz/Ballers-BLogo-Final.png" class="w-20 mb-10">
            <div class="flex flex-col gap-4">
              ${teams.map(t => `<button onclick="go('${t}')" class="btn-main btn-gradient">${t}</button>`).join('')}
              <button onclick="go('Tryouts')" class="btn-main btn-outline">TRYOUTS</button>
              <button onclick="go('Unrostered')" class="mt-4 text-[10px] font-bold text-slate-600 uppercase tracking-widest self-center">View Unrostered</button>
            </div>
          </div>
        `;
      } else {
        const isT = state.selectedTeam === 'Tryouts';
        const isU = state.selectedTeam === 'Unrostered';
        const list = Object.entries(dbData.players)
          .filter(([_, p]) => p.team === state.selectedTeam)
          .sort((a,b) => isT ? new Date(b[1].signUpDate) - new Date(a[1].signUpDate) : a[1].fullName.localeCompare(b[1].fullName));

        app.innerHTML = `
          <div class="p-4 flex flex-col h-full">
            <div class="flex justify-between items-center mb-6">
              <button onclick="window.state.screen='main';window.render()" class="text-slate-500 text-[10px] font-black uppercase">← Back</button>
              <h2 class="text-xl font-black italic uppercase text-center">${state.selectedTeam}</h2>
              <div class="flex gap-4">
                ${isT ? `<button onclick="window.confirmAction('clear')" class="text-red-500 text-[10px] font-black uppercase">CLEAR</button>` : ''}
                ${isT ? `<button onclick="window.confirmAction('sync')" class="text-green-400 text-[10px] font-black uppercase">SYNC</button>` : ''}
              </div>
            </div>

            <div class="flex-1 overflow-y-auto space-y-2 pb-20">
              ${list.map(([id, p]) => `
                <div class="player-card flex justify-between items-center cursor-pointer" onclick="openProfile('${id}')">
                  <div class="flex-1">
                    <div class="font-black uppercase text-sm leading-tight mb-1">${p.fullName}</div>
                    <div class="text-[9px] text-slate-500 font-bold uppercase">
                        ${isT ? `Signed: ${p.signUpDate}` : `#${p.jersey || '00'} • ${p.pos || 'POS'}`} • AGE: ${p.age || calcAge(p.dob)}
                    </div>
                  </div>
                  <div>
                    ${(!isT && !isU) ? `
                      <button onclick="event.stopPropagation();payChoice('${id}')" class="text-[9px] font-black h-7 px-3 rounded ${p.paid ? 'bg-green-500/20 text-green-400' : 'animate-blink text-white'}">
                        ${p.paid ? `PAID` : 'UNPAID'}
                      </button>` : ''
                    }
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }
    }

    window.confirmAction = (type) => {
        const isSync = type === 'sync';
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6';
        modal.innerHTML = `
            <div class="bg-slate-900 p-8 rounded-2xl w-full max-w-xs text-center border border-slate-800">
                <h3 class="text-lg font-black mb-6 uppercase italic text-white">${isSync ? 'Sync Tryout Data?' : 'Clear all players?'}</h3>
                <div class="flex flex-col gap-3">
                    <button id="confirmBtn" class="py-4 bg-white text-black font-black uppercase rounded-xl text-xs">YES</button>
                    <button onclick="this.closest('.fixed').remove()" class="py-4 bg-slate-800 text-white font-black uppercase rounded-xl text-xs">CANCEL</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('confirmBtn').onclick = () => {
            if(isSync) executeSync();
            else executeClear();
            modal.remove();
        };
    };

    window.executeClear = () => {
        Object.entries(dbData.players).forEach(([id, p]) => {
            if(p.team === 'Tryouts') remove(ref(db, `players/${id}`));
        });
    };

    window.migrateChoice = (id) => {
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/95 z-[110] flex items-center justify-center p-6';
        modal.innerHTML = `
            <div class="bg-slate-900 p-6 rounded-2xl w-full max-w-xs text-center border border-slate-800">
                <div class="flex flex-col gap-3">
                    <button onclick="teamBubbles('${id}')" class="py-4 bg-white text-black font-black uppercase rounded-xl text-xs">MOVE TO ROSTER</button>
                    <button onclick="movePlayer('${id}', 'Unrostered')" class="py-4 bg-slate-800 text-white font-black uppercase rounded-xl text-xs">UNROSTER</button>
                    <button onclick="this.closest('.fixed').remove()" class="mt-4 text-[10px] font-bold text-slate-500">CANCEL</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    };

    window.teamBubbles = (id) => {
        const teams = Object.keys(dbData.teams);
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/95 z-[120] flex items-center justify-center p-6';
        modal.innerHTML = `
            <div class="bg-slate-900 p-6 rounded-2xl w-full max-w-xs border border-slate-800 text-center">
                <p class="text-[10px] font-bold mb-6 uppercase text-slate-500">Assign Squad</p>
                <div class="flex flex-wrap justify-center gap-4">
                    ${teams.map(t => `<button onclick="movePlayer('${id}', '${t}')" class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center text-[9px] font-black uppercase italic border border-slate-700">${t}</button>`).join('')}
                </div>
                <button onclick="this.closest('.fixed').remove()" class="mt-8 text-[10px] font-bold text-slate-500">CANCEL</button>
            </div>
        `;
        document.body.appendChild(modal);
    };

    // --- ULTRA CONDENSED PROFILE ---
    window.openProfile = (id) => {
      const p = dbData.players[id];
      const isT = p.team === 'Tryouts';
      
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4';
      modal.innerHTML = `
        <div class="profile-modal">
          <div class="flex justify-between items-center mb-3">
            <h2 class="text-xs font-black uppercase italic tracking-wider">Player Profile</h2>
            ${isT ? `<button onclick="migrateChoice('${id}')" class="text-[8px] font-black bg-white text-black px-2 py-1 rounded animate-blink">MIGRATE</button>` : ''}
          </div>
          
          <div class="grid grid-cols-3 gap-2">
            <div class="col-span-3">
                <label>Name</label><input id="p-name" value="${p.fullName}">
            </div>
            <div>
                <label>Age</label><input value="${p.age || calcAge(p.dob)}" disabled class="opacity-40">
            </div>
            <div>
                <label>Div</label><input id="p-grade" value="${p.grade || ''}">
            </div>
            <div>
                <label>Jersey</label><input id="p-num" value="${p.jersey || ''}" ${isT ? 'disabled opacity-30' : ''}>
            </div>
            <div class="col-span-3">
                <label>Experience</label><input id="p-exp" value="${p.experience || ''}">
            </div>
            <div class="col-span-3">
                <label>Birthdate</label><input id="p-dob" type="date" value="${p.dob || ''}">
            </div>

            ${!isT ? `
                <div class="col-span-2">
                    <label>Parent</label><input id="p-pname" value="${p.parentName || ''}">
                </div>
                <div>
                    <label>Pos</label>
                    <select id="p-pos">
                        <option value="">--</option>
                        <option ${p.pos==='PG'?'selected':''}>PG</option>
                        <option ${p.pos==='SG'?'selected':''}>SG</option>
                        <option ${p.pos==='SF'?'selected':''}>SF</option>
                        <option ${p.pos==='PF'?'selected':''}>PF</option>
                        <option ${p.pos==='C'?'selected':''}>C</option>
                    </select>
                </div>
                <div class="col-span-3 grid grid-cols-2 gap-2">
                    <div><label>Phone</label><input id="p-phone" value="${p.parentPhone || ''}"></div>
                    <div><label>Email</label><input id="p-email" value="${p.parentEmail || ''}"></div>
                </div>
            ` : ''}
          </div>

          ${isT ? `
            <div class="mt-3 p-2 border border-dashed border-slate-800 rounded text-center">
                <p class="text-[7px] text-slate-500 uppercase font-black">More details available when added to roster</p>
            </div>
          ` : ''}
          
          <div class="mt-4 flex gap-2">
            <button onclick="this.closest('.fixed').remove()" class="flex-1 py-1.5 text-[9px] font-bold text-slate-500 uppercase">Cancel</button>
            <button onclick="saveProfile('${id}')" class="flex-1 py-1.5 bg-green-500 text-black font-black rounded text-[9px] uppercase">Save</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    };

    window.saveProfile = (id) => {
        const updates = {
            fullName: document.getElementById('p-name').value,
            grade: document.getElementById('p-grade').value,
            dob: document.getElementById('p-dob').value,
            age: calcAge(document.getElementById('p-dob').value) !== "N/A" ? calcAge(document.getElementById('p-dob').value) : (dbData.players[id].age || "N/A"),
            experience: document.getElementById('p-exp').value
        };
        
        if (document.getElementById('p-num')) updates.jersey = document.getElementById('p-num').value;
        if (document.getElementById('p-pos')) updates.pos = document.getElementById('p-pos').value;
        if (document.getElementById('p-pname')) updates.parentName = document.getElementById('p-pname').value;
        if (document.getElementById('p-phone')) updates.parentPhone = document.getElementById('p-phone').value;
        if (document.getElementById('p-email')) updates.parentEmail = document.getElementById('p-email').value;

        update(ref(db, `players/${id}`), updates);
        document.querySelectorAll('.fixed').forEach(m => m.remove());
    };

    window.movePlayer = (id, team) => {
        update(ref(db, `players/${id}`), { team: team, detailsLocked: false });
        document.querySelectorAll('.fixed').forEach(m => m.remove());
    };

    window.payChoice = (id) => {
        const p = dbData.players[id];
        update(ref(db, `players/${id}`), { paid: !p.paid });
    };

    window.addTeam = () => {
        const name = prompt("Team Name:");
        if(name) set(ref(db, `teams/${name}`), true);
    };

    window.go = (t) => { state.selectedTeam = t; state.screen = 'roster'; render(); };
    window.state = state;
    window.render = render;

    init();
  </script>
</body>
</html>
