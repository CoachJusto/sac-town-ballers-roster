<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Ballers Manager Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body, html { background:#020617; color:white; height:100vh; margin:0; overflow:hidden; }
#app { height:100%; display:flex; flex-direction:column; }

.btn-main { width:280px; padding:1.25rem; border-radius:1rem; font-weight:900; }
.btn-gradient { background:linear-gradient(135deg,#38ff14,#028e3a); color:black; }

.player-card { background:#0f172a; border:1px solid #1e293b; padding:1rem; border-radius:.75rem; cursor:pointer; }

.modal { position:fixed; inset:0; background:rgba(0,0,0,.9); display:flex; align-items:center; justify-content:center; z-index:100; }

.animate-blink { animation:blink 1s infinite; }
@keyframes blink { 0%,100%{background:#ef4444;}50%{background:#7f1d1d;} }
</style>
</head>

<body>
<div id="app"></div>

<script>
/* ------------------ FIREBASE ------------------ */
const firebaseConfig = {
  apiKey: "AIzaSyBRlFQLj41BR_59Pjh3WDPpDjDxCnf4AXs",
  authDomain: "sac-town-ballers-roster.firebaseapp.com",
  databaseURL: "https://sac-town-ballers-roster-default-rtdb.firebaseio.com/",
  projectId: "sac-town-ballers-roster",
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ------------------ STATE ------------------ */
let dbData = { players:{}, teams:{} };
let state = { screen:'main', selectedTeam:null };

/* ------------------ LISTENER ------------------ */
db.ref('/').on('value', snap => {
  const data = snap.val() || {};
  dbData.players = data.players || {};
  dbData.teams = data.teams || { JV:true, Varsity:true };
  render();
});

/* ------------------ RENDER ------------------ */
function render(){
  const app = document.getElementById('app');

  if(state.screen === 'main'){
    const teams = Object.keys(dbData.teams);

    app.innerHTML = `
      <div class="flex flex-col items-center pt-12">
        <button onclick="addTeam()" class="absolute top-4 right-4">+ TEAM</button>
        <div class="flex flex-col gap-6 mt-10">
          ${teams.map(t=>`<button onclick="go('${t}')" class="btn-main btn-gradient">${t}</button>`).join('')}
          <button onclick="go('Tryouts')" class="btn-main border">TRYOUTS</button>
          <button onclick="go('Unrostered')" class="text-sm mt-6">Unrostered</button>
        </div>
      </div>
    `;
    return;
  }

  const isT = state.selectedTeam === 'Tryouts';
  const isU = state.selectedTeam === 'Unrostered';

  const list = Object.entries(dbData.players)
    .filter(([id,p])=>p.team === state.selectedTeam)
    .sort((a,b)=>{
      if(isT) return new Date(b[1].signUpDate||0) - new Date(a[1].signUpDate||0);
      return (a[1].fullName||'').localeCompare(b[1].fullName||'');
    });

  app.innerHTML = `
    <div class="p-5 flex flex-col h-full">
      <div class="flex justify-between mb-6">
        <button onclick="goBack()">Back</button>
        <h2>${state.selectedTeam}</h2>
        <div>
          ${isT ? `<button onclick="confirmClear()">CLEAR</button>` : ''}
          ${isT ? `<button onclick="syncSheet()">SYNC</button>` : ''}
        </div>
      </div>

      <div class="flex-1 overflow-y-auto space-y-2">
        ${list.length ? list.map(([id,p])=>`
          <div class="player-card flex justify-between" onclick="openProfile('${id}')">
            <div>
              <div>${p.fullName || 'Unnamed Player'}</div>
              <div class="text-xs text-slate-400">
                ${isT
                  ? `DIV: ${p.grade||'N/A'} • EXP: ${p.experience||'N/A'}`
                  : `#${p.jersey||'00'} • ${p.pos||'POS'}`
                }
              </div>
            </div>

            ${(!isT && !isU) ? `
              <button onclick="payChoice(event,'${id}')"
              class="px-3 ${p.paid ? 'bg-green-500' : 'animate-blink'}">
                ${p.paid ? 'PAID' : 'UNPAID'}
              </button>
            `:''}
          </div>
        `).join('') : `<p>No Players</p>`}
      </div>
    </div>
  `;
}

/* ------------------ NAV ------------------ */
function go(t){ state.selectedTeam=t; state.screen='roster'; render(); }
function goBack(){ state.screen='main'; render(); }

/* ------------------ PROFILE ------------------ */
function openProfile(id){
  const p = dbData.players[id];
  if(!p) return;

  const modal = document.createElement('div');
  modal.className='modal';

  modal.innerHTML = `
    <div class="bg-slate-900 p-6 rounded">
      <h2>${p.fullName}</h2>

      <input id="edit-exp" value="${p.experience||''}" placeholder="Experience">

      <div class="flex gap-2 mt-4">
        <button onclick="closeModal()">Cancel</button>
        <button onclick="saveChanges('${id}')">Save</button>
      </div>
    </div>
  `;

  document.body.appendChild(modal);
}

function closeModal(){
  document.querySelectorAll('.modal').forEach(m=>m.remove());
}

/* ------------------ SAVE ------------------ */
function saveChanges(id){
  const exp = document.getElementById('edit-exp').value;
  db.ref(`players/${id}`).update({ experience:exp });
  closeModal();
}

/* ------------------ PAY ------------------ */
function payChoice(e,id){
  e.stopPropagation();
  const p = dbData.players[id];
  db.ref(`players/${id}`).update({ paid:!p.paid });
}

/* ------------------ TEAM ------------------ */
function addTeam(){
  const name = prompt("Team name?");
  if(name) db.ref(`teams/${name}`).set(true);
}

/* ------------------ CLEAR ------------------ */
function confirmClear(){
  const confirmText = prompt("Type DELETE to confirm");
  if(confirmText === "DELETE"){
    Object.entries(dbData.players).forEach(([id,p])=>{
      if(p.team==='Tryouts') db.ref(`players/${id}`).remove();
    });
  }
}

/* ------------------ SYNC ------------------ */
async function syncSheet(){
  const url = "YOUR CSV URL";

  try{
    const res = await fetch(url);
    const text = await res.text();

    const rows = text.split(/\r?\n/).slice(1);

    rows.forEach(row=>{
      const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      const name = c[5]?.replace(/"/g,'').trim();

      if(!name) return;

      const exists = Object.values(dbData.players)
        .some(p=>p.fullName===name);

      if(!exists){
        db.ref('players').push({
          fullName:name,
          team:'Tryouts',
          signUpDate:new Date().toISOString()
        });
      }
    });

  }catch(e){
    alert("Sync failed");
  }
}
</script>
</body>
</html>
