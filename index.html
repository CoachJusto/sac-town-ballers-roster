<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ballers Roster & Fees</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --pantone-802c: #00FF6C; }
    .pantone-802c { color: var(--pantone-802c); }
    .bg-pantone-802c { background-color: var(--pantone-802c); }
    body { background-color: #020617; color: white; font-family: sans-serif; }
    .player-card { background: #0f172a; border: 1px solid #1e293b; transition: all 0.2s; }
    .greyed-out { opacity: 0.4; filter: grayscale(1); }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen pb-10"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRlFQLj41BR_59Pjh3WDPpDjDxCnf4AXs",
      authDomain: "sac-town-ballers-roster.firebaseapp.com",
      databaseURL: "https://sac-town-ballers-roster-default-rtdb.firebaseio.com/",
      projectId: "sac-town-ballers-roster",
      storageBucket: "sac-town-ballers-roster.firebasestorage.app",
      messagingSenderId: "80873311127",
      appId: "1:80873311127:web:c59008f0242cf5123052d2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let dbData = { players: {} };
    let state = { 
      screen: 'teamSelect', 
      selectedTeam: null, 
      activePlayerId: null, 
      view: 'list'
    };

    const getCurrentMonth = () => new Date().toLocaleString('default', { month: 'long', year: 'numeric' });

    function init() {
      onValue(ref(db, 'players'), (snap) => {
        dbData.players = snap.val() || {};
        render();
      });
    }

    async function updatePlayer(id, data) {
      await set(ref(db, `players/${id}`), { ...dbData.players[id], ...data });
    }

    function getRosterSize(teamName) {
      return Object.values(dbData.players).filter(p => p.team === teamName && p.status === 'active').length;
    }

    function render() {
      const appEl = document.getElementById('app');
      appEl.innerHTML = '';

      // --- SCREEN: TEAM SELECTION ---
      if (state.screen === 'teamSelect') {
        appEl.innerHTML = `
          <div class="flex flex-col items-center pt-20 px-4">
            <img src="https://i.ibb.co/s9vfBcCz/Ballers-BLogo-Final.png" class="w-32 mb-8">
            <h1 class="text-3xl font-black mb-10 italic uppercase">Select Squad</h1>
            ${['Jr. High', 'JV', 'Varsity'].map(team => `
              <div class="flex flex-col items-center mb-6">
                <button onclick="window.selectTeam('${team}')" class="w-72 py-5 bg-pantone-802c text-black font-black text-xl rounded-2xl shadow-lg shadow-green-500/20 active:scale-95 transition-transform">${team}</button>
                <p class="text-[10px] font-bold text-slate-500 mt-2 tracking-widest uppercase">ROSTER SIZE: ${getRosterSize(team)}</p>
              </div>
            `).join('')}
          </div>
        `;
      }

      // --- SCREEN: ROSTER LIST ---
      if (state.screen === 'roster') {
        const teamPlayers = Object.entries(dbData.players)
          .filter(([_, p]) => p.team === state.selectedTeam)
          .sort((a, b) => a[1].fullName.localeCompare(b[1].fullName));

        appEl.innerHTML = `
          <div class="max-w-md mx-auto p-4">
            <div class="flex justify-between items-center mb-8">
              <button onclick="window.goBackToTeams()" class="text-slate-500 text-sm font-bold uppercase tracking-tight">← Teams</button>
              <h2 class="text-2xl font-black pantone-802c italic">${state.selectedTeam.toUpperCase()}</h2>
              <button onclick="window.quickAdd()" class="bg-white text-black px-4 py-1 rounded-full font-bold text-xs">+ ADD</button>
            </div>
            <div class="space-y-3">
              ${teamPlayers.map(([id, p]) => {
                const currentMonth = getCurrentMonth();
                const isPaid = p.lastPaymentMonth === currentMonth;
                return `
                  <div class="player-card p-4 rounded-xl flex justify-between items-center ${p.status === 'inactive' ? 'greyed-out' : ''}">
                    <div class="flex-1 cursor-pointer" onclick="window.openDetails('${id}')">
                      <div class="font-bold text-lg">${p.fullName}</div>
                      <div class="text-xs text-slate-500 uppercase">${p.jerseyNumber ? '#'+p.jerseyNumber : 'No #'} • ${p.grade || 'No Grade'}</div>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                      <button onclick="window.openPayment('${id}')" class="px-3 py-1 rounded-lg font-black text-[10px] ${isPaid ? 'bg-green-500/20 text-green-400' : 'bg-red-500 text-white animate-pulse'}">
                        ${isPaid ? 'PAID' : 'UNPAID'}
                      </button>
                      ${isPaid && p.paymentMethod ? `<p class="text-[8px] font-bold text-slate-500 uppercase">via ${p.paymentMethod}</p>` : ''}
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }

      // --- VIEW: DETAILS MODAL ---
      if (state.view === 'details' && state.activePlayerId) {
        const p = dbData.players[state.activePlayerId];
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/95 z-50 p-6 overflow-y-auto';
        modal.innerHTML = `
          <div class="max-w-sm mx-auto">
            <h2 class="text-2xl font-black mb-6 italic">PLAYER PROFILE</h2>
            <div class="space-y-4">
              <div><label class="text-[10px] text-slate-500 font-bold ml-1 uppercase tracking-widest">Full Name</label><input id="det-name" value="${p.fullName}" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700"></div>
              <div class="flex gap-4">
                <div class="flex-1"><label class="text-[10px] text-slate-500 font-bold ml-1 uppercase tracking-widest">Jersey #</label><input id="det-num" value="${p.jerseyNumber || ''}" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700"></div>
                <div class="flex-1"><label class="text-[10px] text-slate-500 font-bold ml-1 uppercase tracking-widest">Grade</label><input id="det-grade" value="${p.grade || ''}" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700"></div>
              </div>
              <div><label class="text-[10px] text-slate-500 font-bold ml-1 uppercase tracking-widest">Birthdate</label><input id="det-dob" value="${p.birthdate || ''}" placeholder="MM/DD/YYYY" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700"></div>
              <div><label class="text-[10px] text-slate-500 font-bold ml-1 uppercase tracking-widest">Parent Name</label><input id="det-pname" value="${p.parentName || ''}" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700"></div>
              <div><label class="text-[10px] text-slate-500 font-bold ml-1 uppercase tracking-widest">Parent Phone</label><input id="det-pphone" value="${p.parentPhone || ''}" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700"></div>
              <div><label class="text-[10px] text-slate-500 font-bold ml-1 uppercase tracking-widest">Parent Email</label><input id="det-pemail" value="${p.parentEmail || ''}" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700"></div>
            </div>
            <div class="mt-8 space-y-3">
              <button onclick="window.saveDetails()" class="w-full py-4 bg-pantone-802c text-black font-black rounded-xl uppercase tracking-widest active:scale-95 transition-transform">Save</button>
              <button onclick="window.toggleStatus()" class="w-full py-4 bg-slate-800 text-slate-400 font-bold rounded-xl uppercase text-xs">${p.status === 'inactive' ? 'Restore to Roster' : 'Remove from Roster'}</button>
              <button onclick="window.closeModals()" class="w-full py-2 text-slate-500 font-bold uppercase text-xs">Close</button>
            </div>
          </div>
        `;
        appEl.appendChild(modal);
      }

      // --- VIEW: PAYMENT MODAL ---
      if (state.view === 'payment' && state.activePlayerId) {
        const p = dbData.players[state.activePlayerId];
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6';
        modal.innerHTML = `
          <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-xs text-center border border-slate-800 shadow-2xl">
            <h3 class="text-xl font-black mb-2">${p.fullName}</h3>
            <p class="text-slate-400 text-xs mb-6 uppercase tracking-tighter italic">Fee for ${getCurrentMonth()}</p>
            <div class="grid grid-cols-2 gap-3">
              <button onclick="window.markPaid('Venmo')" class="py-4 bg-[#3d95ce] rounded-xl font-bold active:scale-95 transition-transform text-xs">VENMO</button>
              <button onclick="window.markPaid('CashApp')" class="py-4 bg-[#00d35c] rounded-xl font-bold active:scale-95 transition-transform text-xs">CASHAPP</button>
              <button onclick="window.markPaid('Apple Pay')" class="py-4 bg-white text-black rounded-xl font-bold active:scale-95 transition-transform text-xs">APPLE</button>
              <button onclick="window.markPaid('Cash')" class="py-4 bg-slate-700 rounded-xl font-bold active:scale-95 transition-transform text-xs text-green-400">CASH</button>
            </div>
            <button onclick="window.closeModals()" class="mt-6 text-slate-500 font-bold text-[10px] uppercase tracking-widest underline decoration-slate-700">Cancel</button>
          </div>
        `;
        appEl.appendChild(modal);
      }
    }

    // --- LOGIC HANDLERS ---
    window.selectTeam = (team) => { 
      state.selectedTeam = team; 
      state.screen = 'roster'; 
      render(); 
    };

    window.goBackToTeams = () => {
      state.screen = 'teamSelect';
      state.selectedTeam = null;
      render();
    };

    window.quickAdd = () => {
      const name = prompt("Enter athlete's full name:");
      if (!name) return;
      const id = 'p-' + Date.now();
      updatePlayer(id, { fullName: name, team: state.selectedTeam, status: 'active' });
    };

    window.openDetails = (id) => { state.activePlayerId = id; state.view = 'details'; render(); };
    window.openPayment = (id) => { state.activePlayerId = id; state.view = 'payment'; render(); };
    window.closeModals = () => { state.view = 'list'; render(); };

    window.saveDetails = () => {
      const id = state.activePlayerId;
      updatePlayer(id, {
        fullName: document.getElementById('det-name').value,
        jerseyNumber:
