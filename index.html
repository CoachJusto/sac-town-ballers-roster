<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sac Town Ballers Roster</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --pantone-802c: #00FF6C;
  }
  .pantone-802c { color: var(--pantone-802c); }
  .bg-pantone-802c { background-color: var(--pantone-802c); }
  .hover-bg-pantone-802c:hover { background-color: #00e05a; }
</style>
</head>
<body class="bg-slate-950 text-white h-screen flex items-center justify-center">
<div id="app" class="w-full h-full"></div>
<script>
const TEAMS = ['Jr. High', 'JV', 'Varsity'];
const STORAGE_KEY = 'roster_data';
let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { players: [] };

let state = { screen: 'splash', selectedTeam: null, selectedPlayer: null, showEditModal: false, showRemoveModal: false, tempPlayer: null, removeReason: '' };

function saveDb() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

function uuid() { return 'id-' + Math.random().toString(36).slice(2) + Date.now().toString(36); }

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  if(state.screen === 'splash') {
    const div = document.createElement('div');
    div.className = 'flex flex-col items-center justify-center h-full';
    div.innerHTML = `<h1 class='text-4xl md:text-6xl font-black pantone-802c'>Sac Town Ballers Roster</h1>`;
    app.appendChild(div);
    setTimeout(() => { state.screen='teamSelect'; render(); }, 2000);
  }

  else if(state.screen === 'teamSelect') {
    const div = document.createElement('div');
    div.className='flex flex-col items-center gap-6 mt-10';
    TEAMS.forEach(team => {
      const btn = document.createElement('button');
      btn.textContent = team;
      btn.className='px-8 py-4 rounded-2xl font-bold bg-pantone-802c hover-bg-pantone-802c text-slate-950 text-xl';
      btn.onclick = () => { state.selectedTeam = team; state.screen='roster'; render(); };
      div.appendChild(btn);
    });
    app.appendChild(div);
  }

  else if(state.screen === 'roster') {
    const div = document.createElement('div');
    div.className='max-w-xl mx-auto mt-6';
    const header = document.createElement('div');
    header.className='flex justify-between mb-4 items-center';
    const title = document.createElement('h2');
    title.textContent = state.selectedTeam;
    title.className='text-2xl font-bold';
    const addBtn = document.createElement('button');
    addBtn.textContent='Add Player';
    addBtn.className='px-4 py-2 rounded bg-pantone-802c text-slate-950 font-semibold';
    addBtn.onclick = () => { state.tempPlayer={id:uuid(),team:state.selectedTeam,fullName:'',jerseyNumber:'',jerseySize:'',birthdate:'',parentName:'',parentEmail:'',parentPhone:'',status:'active',removalReason:null}; state.showEditModal=true; render(); };
    const backBtn = document.createElement('button');
    backBtn.textContent='Back';
    backBtn.className='px-4 py-2 rounded bg-slate-700 text-white font-semibold';
    backBtn.onclick = () => { state.screen='teamSelect'; render(); };
    header.appendChild(backBtn);
    header.appendChild(title);
    header.appendChild(addBtn);
    div.appendChild(header);

    // Active players
    const activePlayers = db.players.filter(p=>p.team===state.selectedTeam && p.status==='active').sort((a,b)=>a.fullName.localeCompare(b.fullName));
    activePlayers.forEach(p=>{
      const pDiv = document.createElement('div');
      pDiv.textContent = p.fullName;
      pDiv.className='cursor-pointer px-3 py-2 border-b border-slate-700';
      pDiv.onclick = () => { state.selectedPlayer=p; state.tempPlayer={...p}; state.showEditModal=true; render(); };
      div.appendChild(pDiv);
    });

    // Inactive players
    const inactivePlayers = db.players.filter(p=>p.team===state.selectedTeam && p.status==='inactive').sort((a,b)=>a.fullName.localeCompare(b.fullName));
    if(inactivePlayers.length>0){
      const inactiveHeader=document.createElement('div');
      inactiveHeader.textContent='Inactive';
      inactiveHeader.className='mt-4 font-semibold text-slate-400';
      div.appendChild(inactiveHeader);
      inactivePlayers.forEach(p=>{
        const pDiv = document.createElement('div');
        pDiv.textContent = p.fullName + ' (' + (p.removalReason||'') + ')';
        pDiv.className='cursor-pointer px-3 py-2 border-b border-slate-700 text-slate-400';
        pDiv.onclick = () => { state.selectedPlayer=p; state.tempPlayer={...p}; state.showEditModal=true; render(); };
        div.appendChild(pDiv);
      });
    }
    app.appendChild(div);
  }

  // Edit / Add Modal
  if(state.showEditModal){
    const modal=document.createElement('div');
    modal.className='fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center';
    const content=document.createElement('div');
    content.className='bg-slate-900 p-6 rounded-2xl max-w-md w-full flex flex-col gap-2';
    ['fullName','jerseyNumber','jerseySize','birthdate','parentName','parentEmail','parentPhone'].forEach(f=>{
      const input=document.createElement('input');
      input.placeholder=f;
      input.value=state.tempPlayer[f];
      input.className='p-2 rounded text-slate-950 w-full';
      input.oninput=(e)=>{state.tempPlayer[f]=e.target.value;};
      content.appendChild(input);
    });
    const btns=document.createElement('div');
    btns.className='flex justify-between mt-4 gap-2';
    const saveBtn=document.createElement('button');
    saveBtn.textContent='Save';
    saveBtn.className='flex-1 px-4 py-2 bg-pantone-802c text-slate-950 rounded';
    saveBtn.onclick=()=>{
      const idx=db.players.findIndex(p=>p.id===state.tempPlayer.id);
      if(idx>=0){ db.players[idx]={...state.tempPlayer}; }
      else{ db.players.push({...state.tempPlayer}); }
      saveDb(); state.showEditModal=false; render();
    };
    const cancelBtn=document.createElement('button');
    cancelBtn.textContent='Cancel';
    cancelBtn.className='flex-1 px-4 py-2 bg-slate-700 text-white rounded';
    cancelBtn.onclick=()=>{state.showEditModal=false; render();};
    const removeBtn=document.createElement('button');
    removeBtn.textContent='Remove from Roster';
    removeBtn.className='flex-1 px-4 py-2 bg-red-600 text-white rounded';
    removeBtn.onclick=()=>{
      const reason=prompt('Why is this athlete being removed?');
      if(reason){
        state.tempPlayer.status='inactive';
        state.tempPlayer.removalReason=reason;
        const idx=db.players.findIndex(p=>p.id===state.tempPlayer.id);
        if(idx>=0){ db.players[idx]={...state.tempPlayer}; }
        saveDb(); state.showEditModal=false; render();
      }
    };
    btns.appendChild(saveBtn); btns.appendChild(cancelBtn); btns.appendChild(removeBtn);
    content.appendChild(btns);
    modal.appendChild(content);
    app.appendChild(modal);
  }
}

render();
</script>
</body>
</html>
