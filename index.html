<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ballers Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --pantone-802c: #00FF6C; }
    .pantone-802c { color: var(--pantone-802c); }
    body, html { background-color: #020617 !important; margin: 0; padding: 0; min-height: 100vh; color: white; font-family: sans-serif; }
    #app { background-color: #020617 !important; min-height: 100vh; }
    
    .btn-main { width: 240px; padding: 1.25rem; border-radius: 0.75rem; text-transform: uppercase; font-style: italic; font-weight: 900; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .btn-small { width: 240px; padding: 0.75rem; border-radius: 0.75rem; text-transform: uppercase; font-weight: 900; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; }
    .btn-gradient { background: linear-gradient(135deg, #38ff14 0%, #028e3a 100%); color: black; }
    .btn-outline { border: 2px dashed #1e293b; color: #475569; }
    .btn-green-fill { background: var(--pantone-802c); color: black; }
    
    .player-card { background: #0f172a; border: 1px solid #1e293b; }
    .pay-status-btn { width: 90px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 0.5rem; font-weight: 900; font-size: 10px; text-transform: uppercase; }
    
    @keyframes pulse-red { 0% { background-color: #ef4444; } 50% { background-color: #991b1b; } 100% { background-color: #ef4444; } }
    .animate-flash { animation: pulse-red 1.5s infinite; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRlFQLj41BR_59Pjh3WDPpDjDxCnf4AXs",
      authDomain: "sac-town-ballers-roster.firebaseapp.com",
      databaseURL: "https://sac-town-ballers-roster-default-rtdb.firebaseio.com/",
      projectId: "sac-town-ballers-roster",
    };

    const fb = initializeApp(firebaseConfig);
    const db = getDatabase(fb);
    let dbData = { players: {}, teams: {} };
    let state = { screen: 'main', selectedTeam: null, activeId: null, modal: null, hasNewTryouts: false };

    const getPeriod = () => new Date().toLocaleString('default', { month: 'long' }).toUpperCase();

    function init() {
      onValue(ref(db, '/'), (snap) => {
        const data = snap.val() || {};
        dbData.players = data.players || {};
        dbData.teams = data.teams || { "JV": true, "Varsity": true };
        render();
      });
    }

    // --- LOGIC ---
    async function runSync() {
      if(!confirm("Sync with Google Form?")) return;
      const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStWiziLmn7ZOT7DZT7ak_E4XDLsl4g3yEBqeDARSz7LC6NoFj4GfpKSBjrKtKUkxSsvEegywlD6Rd5/pub?gid=1820988393&single=true&output=csv";
      try {
        const res = await fetch(csvUrl);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        const existing = Object.values(dbData.players).map(p => p.fullName.toLowerCase().trim());
        let added = 0;

        rows.forEach(row => {
          const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          const name = c[5]?.replace(/"/g, '').trim(); 
          if (name && !existing.includes(name.toLowerCase())) {
            const id = 'p-' + Date.now() + Math.floor(Math.random()*1000);
            set(ref(db, `players/${id}`), {
              fullName: name,
              signUpDate: c[0]?.split(' ')[0] || '',
              parentName: c[1]?.replace(/"/g, '') || '',
              parentPhone: c[2]?.replace(/"/g, '') || '',
              parentEmail: c[3]?.replace(/"/g, '') || '',
              grade: c[4]?.replace(/"/g, '') || 'N/A',
              team: 'Tryouts'
            });
            added++;
          }
        });
        state.hasNewTryouts = added > 0;
        alert(`Sync Complete: ${added} new athletes.`);
      } catch (e) { alert("Sync Error"); }
    }

    // --- RENDER ---
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = '';

      if (state.screen === 'main') {
        const teams = Object.keys(dbData.teams);
        app.innerHTML = `
          <div class="flex flex-col items-center pt-8 px-4 w-full relative">
            <button onclick="window.addTeamPrompt()" class="absolute top-4 right-4 text-white text-xs font-bold bg-white/10 px-3 py-1 rounded">+ TEAM</button>
            <img src="https://i.ibb.co/s9vfBcCz/Ballers-BLogo-Final.png" class="w-20 mb-6">
            <h1 class="text-2xl font-black mb-8 italic uppercase">Select Squad</h1>
            <div class="flex flex-col gap-3">
              ${teams.map(t => `<button onclick="window.viewTeam('${t}')" class="btn-main btn-gradient">${t}</button>`).join('')}
              <button oncontextmenu="window.tryoutHold(event)" onclick="window.viewTeam('Tryouts')" class="btn-main ${state.hasNewTryouts ? 'btn-green-fill' : 'btn-outline'}">TRYOUTS</button>
              <div class="mt-4 flex flex-col gap-2">
                <button onclick="window.runSync()" class="btn-small border border-green-500 text-green-500">🔄 SYNC GOOGLE FORM</button>
                <button onclick="window.viewTeam('Unrostered')" class="btn-small border border-slate-700 text-slate-600">UNROSTERED</button>
              </div>
            </div>
          </div>
        `;
      }

      if (state.screen === 'roster') {
        const isT = state.selectedTeam === 'Tryouts';
        const isU = state.selectedTeam === 'Unrostered';
        const list = Object.entries(dbData.players)
          .filter(([_, p]) => p.team === state.selectedTeam)
          .sort((a,b) => isT ? new Date(b[1].signUpDate) - new Date(a[1].signUpDate) : a[1].fullName.localeCompare(b[1].fullName));

        app.innerHTML = `
          <div class="max-w-md mx-auto p-4 w-full">
            <div class="flex justify-between items-center mb-6">
              <button onclick="state.screen='main';render()" class="text-slate-500 text-[10px] font-black uppercase tracking-widest">← Back</button>
              <div class="text-center flex items-center gap-2">
                <h2 class="text-2xl font-black pantone-802c italic uppercase leading-none">
                  ${isT || isU ? state.selectedTeam : `${state.selectedTeam}'S ROSTER`}
                </h2>
                ${(!isT && !isU) ? `<span onclick="editTeamSet()" class="text-green-400 border border-green-400/30 p-1 rounded cursor-pointer">✏️</span>` : ''}
              </div>
              ${!isT ? `<button onclick="window.quickAdd()" class="bg-white text-black px-4 py-1 rounded-lg font-bold text-[10px]">+ ADD</button>` : `<div class="w-10"></div>`}
            </div>
            ${(!isT && !isU) ? `<p class="text-center text-[10px] text-slate-500 font-bold mb-4 uppercase tracking-tighter">${list.length} Players on Roster</p>` : ''}
            <div class="space-y-3">
              ${list.map(([id, p]) => `
                <div class="player-card p-4 rounded-xl flex justify-between items-center ${p.status === 'no-cut' ? 'opacity-40' : ''}">
                  <div class="flex-1 cursor-pointer" onclick="window.openProfile('${id}')">
                    <div class="font-black text-lg leading-tight italic uppercase">${p.fullName}</div>
                    <div class="text-[10px] text-slate-500 uppercase font-black">
                        ${isT ? p.signUpDate : `#${p.jersey || '00'} • ${p.pos || 'POS'}`} • GR: ${p.grade}
                    </div>
                  </div>
                  <div>
                    ${isT ? `<button onclick="window.migrateMenu('${id}')" class="pay-status-btn animate-flash text-white">MIGRATE</button>` : ''}
                    ${isU ? `<button onclick="window.migrateMenu('${id}')" class="pay-status-btn border border-white text-white">ADD TO ROSTER</button>` : ''}
                    ${(!isT && !isU) ? `
                        <div class="text-right">
                          <p class="text-[8px] font-bold text-slate-500 mb-1 tracking-widest uppercase">${getPeriod()}'S FEE</p>
                          <button onclick="window.payMenu('${id}')" class="pay-status-btn ${p.paid ? 'bg-green-500/20 text-green-400' : 'animate-flash text-white'}">
                            ${p.paid ? `PAID via ${p.payMethod}` : 'UNPAID'}
                          </button>
                        </div>
                    ` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }
    }

    // --- MODALS ---
    window.openProfile = (id) => {
      const p = dbData.players[id];
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/95 z-50 p-6 overflow-y-auto';
      modal.innerHTML = `
        <div class="max-w-sm mx-auto pb-20">
          <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black italic uppercase">Player Profile</h2>
            <button onclick="window.migrateMenu('${id}')" class="text-2xl opacity-70">⇆</button>
          </div>
          <div class="grid grid-cols-1 gap-4">
            <div><label class="text-[10px] text-slate-500 font-bold uppercase">Full Name</label><input id="det-name" value="${p.fullName}" class="w-full bg-slate-900 p-3 rounded border border-slate-800 font-bold"></div>
            <div class="flex gap-2">
              <div class="w-1/3"><label class="text-[10px] text-slate-500 font-bold uppercase">Jersey #</label><input id="det-num" value="${p.jersey || ''}" class="w-full bg-slate-900 p-3 rounded border border-slate-800 text-center font-bold"></div>
              <div class="w-2/3"><label class="text-[10px] text-slate-500 font-bold uppercase">Position</label>
                <select id="det-pos" class="w-full bg-slate-900 p-3 rounded border border-slate-800 font-bold">
                  <option ${p.pos==='PG'?'selected':''}>PG</option>
                  <option ${p.pos==='SG'?'selected':''}>SG</option>
                  <option ${p.pos==='SF'?'selected':''}>SF</option>
                  <option ${p.pos==='PF'?'selected':''}>PF</option>
                  <option ${p.pos==='C'?'selected':''}>C</option>
                </select>
              </div>
            </div>
            <div><label class="text-[10px] text-slate-500 font-bold uppercase">Parent Name</label><input id="det-pname" value="${p.parentName}" class="w-full bg-slate-900 p-3 rounded border border-slate-800"></div>
            <div><label class="text-[10px] text-slate-500 font-bold uppercase">Parent Number</label><input id="det-pphone" value="${p.parentPhone}" class="w-full bg-slate-900 p-3 rounded border border-slate-800"></div>
            <div><label class="text-[10px] text-slate-500 font-bold uppercase">Parent Email</label><input id="det-pemail" value="${p.parentEmail}" class="w-full bg-slate-900 p-3 rounded border border-slate-800"></div>
          </div>
          <div class="mt-8 space-y-3">
            <button onclick="window.saveProfile('${id}')" class="w-full py-4 bg-green-500 text-black font-black rounded-xl uppercase">SAVE CHANGES</button>
            <button onclick="this.closest('.fixed').remove()" class="w-full py-2 text-slate-500 font-bold uppercase text-xs">Cancel</button>
            <div class="pt-10 border-t border-slate-900">
                <button class="w-full py-3 border border-dashed border-slate-700 text-xs font-bold uppercase text-slate-500">+ ADD FILE/DOCUMENT</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    };

    window.migrateMenu = (id) => {
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-6';
        modal.innerHTML = `
            <div class="bg-slate-900 p-8 rounded-2xl w-full max-w-xs text-center border border-slate-800">
                <h3 class="text-xl font-black mb-6 uppercase italic">Migrate Action</h3>
                <div class="flex flex-col gap-3">
                    <button onclick="window.teamSelect('${id}')" class="py-4 bg-white text-black font-black uppercase rounded-xl">Add To Roster</button>
                    <button onclick="window.markCut('${id}')" class="py-4 bg-slate-800 text-white font-black uppercase rounded-xl">Didn't Make Team</button>
                    <button onclick="window.syncMerge('${id}')" class="py-4 border border-blue-500 text-blue-500 font-black uppercase rounded-xl">Sync To Player</button>
                </div>
                <button onclick="this.closest('.fixed').remove()" class="mt-4 text-slate-600 text-xs font-bold">CANCEL</button>
            </div>
        `;
        document.body.appendChild(modal);
    };

    window.payMenu = (id) => {
        const methods = ['Venmo', 'CashApp', 'Credit Card', 'Other'];
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-6';
        modal.innerHTML = `
            <div class="bg-slate-900 p-8 rounded-2xl w-full max-w-xs text-center border border-slate-800">
                <h3 class="text-xl font-black mb-6 uppercase italic">Payment Method</h3>
                <div class="flex flex-col gap-2">
                    ${methods.map(m => `<button onclick="window.confirmPay('${id}', '${m}')" class="py-3 bg-slate-800 text-white font-black uppercase rounded-lg">${m}</button>`).join('')}
                    <button onclick="window.confirmPay('${id}', null)" class="py-3 mt-4 text-red-500 text-xs font-bold">RESET TO UNPAID</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    };

    // --- HANDLERS ---
    window.tryoutHold = (e) => {
        e.preventDefault();
        if(!confirm("TRYOUT GLOBAL ACTIONS?")) return;
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-6';
        modal.innerHTML = `
            <div class="bg-slate-900 p-8 rounded-2xl w-full max-w-xs text-center border border-slate-800">
                <h3 class="text-xl font-black mb-6 uppercase italic">Global Tryout</h3>
                <div class="flex flex-col gap-3">
                    <button onclick="window.runSync();this.closest('.fixed').remove()" class="py-4 bg-green-500 text-black font-black uppercase rounded-xl">Sync From Form</button>
                    <button onclick="window.deleteAllTryouts()" class="py-4 bg-red-600 text-white font-black uppercase rounded-xl">DELETE ALL</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    };

    window.addTeamPrompt = () => {
        const name = prompt("New Team Name:");
        if(name && confirm(`Confirm creation of ${name}?`)) set(ref(db, `teams/${name}`), true);
    };

    window.viewTeam = (t) => { state.selectedTeam = t; state.screen = 'roster'; render(); };

    window.saveProfile = (id) => {
        if(!confirm("Update player details?")) return;
        update(ref(db, `players/${id}`), {
            fullName: document.getElementById('det-name').value,
            jersey: document.getElementById('det-num').value,
            pos: document.getElementById('det-pos').value,
            parentName: document.getElementById('det-pname').value,
            parentPhone: document.getElementById('det-pphone').value,
            parentEmail: document.getElementById('det-pemail').value,
        });
        document.querySelector('.fixed').remove();
    };

    window.confirmPay = (id, method) => {
        if(!confirm("Update payment status?")) return;
        update(ref(db, `players/${id}`), { paid: !!method, payMethod: method || '' });
        document.querySelector('.fixed').remove();
    };

    window.markCut = (id) => {
        if(!confirm("Move athlete to Unrostered?")) return;
        update(ref(db, `players/${id}`), { team: 'Unrostered', status: 'no-cut' });
        document.querySelector('.fixed').remove();
    };

    window.teamSelect = (id) => {
        const teams = Object.keys(dbData.teams);
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/95 z-[70] flex items-center justify-center p-6';
        modal.innerHTML = `
            <div class="bg-slate-900 p-8 rounded-2xl w-full max-w-xs text-center border border-slate-800">
                <h3 class="text-xl font-black mb-6 uppercase italic">Select Squad</h3>
                <div class="flex flex-col gap-2">
                    ${teams.map(t => `<button onclick="window.finishMove('${id}', '${t}')" class="py-3 bg-white text-black font-black uppercase rounded-lg">${t}</button>`).join('')}
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    };

    window.finishMove = (id, team) => {
        if(!confirm(`Migrate to ${team}?`)) return;
        update(ref(db, `players/${id}`), { team, status: 'active' });
        document.querySelectorAll('.fixed').forEach(f => f.remove());
    };

    window.deleteAllTryouts = () => {
        if(!confirm("PERMANENTLY DELETE ALL TRYOUT DATA?")) return;
        Object.keys(dbData.players).forEach(id => {
            if(dbData.players[id].team === 'Tryouts') remove(ref(db, `players/${id}`));
        });
        document.querySelector('.fixed').remove();
    };

    init();
  </script>
</body>
</html>
