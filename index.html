<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ballers Pro Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --pantone-802c: #00FF6C; }
    body, html { background-color: #020617 !important; color: white; font-family: sans-serif; min-height: 100vh; }
    .btn-main { width: 240px; padding: 1.25rem; border-radius: 0.75rem; text-transform: uppercase; font-style: italic; font-weight: 900; transition: all 0.2s; }
    .btn-gradient { background: linear-gradient(135deg, #38ff14 0%, #028e3a 100%); color: black; }
    .btn-outline { border: 2px dashed #1e293b; color: #475569; }
    .btn-green { background: #00FF6C !important; color: black !important; border: none !important; }
    .player-card { background: #0f172a; border: 1px solid #1e293b; }
    .inactive-card { opacity: 0.5; filter: grayscale(1); }
    @keyframes blink-red { 0%, 100% { background: #ef4444; } 50% { background: #7f1d1d; } }
    .animate-migrate { animation: blink-red 0.8s infinite; color: white; font-weight: 900; font-size: 10px; padding: 4px 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRlFQLj41BR_59Pjh3WDPpDjDxCnf4AXs",
      authDomain: "sac-town-ballers-roster.firebaseapp.com",
      databaseURL: "https://sac-town-ballers-roster-default-rtdb.firebaseio.com/",
      projectId: "sac-town-ballers-roster",
      storageBucket: "sac-town-ballers-roster.firebasestorage.app",
    };

    const fb = initializeApp(firebaseConfig);
    const db = getDatabase(fb);
    let dbData = { players: {}, teams: {} };
    let state = { screen: 'main', selectedTeam: null, activeId: null, hasNewTryouts: false };

    const getMonth = () => new Date().toLocaleString('default', { month: 'long' }).toUpperCase();

    function load() {
      onValue(ref(db, '/'), (snap) => {
        const data = snap.val() || {};
        dbData.players = data.players || {};
        dbData.teams = data.teams || { "JV": true, "Varsity": true };
        render();
      });
    }

    async function syncSheet() {
      if(!confirm("Start sync with Google Sheets?")) return;
      const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStWiziLmn7ZOT7DZT7ak_E4XDLsl4g3yEBqeDARSz7LC6NoFj4GfpKSBjrKtKUkxSsvEegywlD6Rd5/pub?gid=1820988393&single=true&output=csv";
      try {
        const res = await fetch(csvUrl);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        const existingNames = Object.values(dbData.players).map(p => p.fullName.toLowerCase().trim());
        
        let added = 0;
        rows.forEach(row => {
          const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          const name = c[5]?.replace(/"/g, '').trim(); // Col F
          if (name && !existingNames.includes(name.toLowerCase())) {
            const id = 'p-' + Date.now() + Math.random().toString(36).substr(2, 5);
            set(ref(db, `players/${id}`), {
              fullName: name,
              signUpDate: c[0]?.split(' ')[0] || '', // Col A
              parentName: c[1]?.replace(/"/g, '').trim() || '', // Col B
              parentPhone: c[2]?.replace(/"/g, '').trim() || '', // Col C
              parentEmail: c[3]?.replace(/"/g, '').trim() || '', // Col D
              grade: c[4] || 'N/A',
              team: 'Tryouts',
              status: 'active'
            });
            added++;
          }
        });
        state.hasNewTryouts = added > 0;
        alert(added > 0 ? `Sync complete! ${added} new athletes added.` : "No new athletes found.");
        render();
      } catch (e) { alert("Sync failed. Check connection."); }
    }

    // --- RENDER ENGINE ---
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = '';
      
      if (state.screen === 'main') {
        const teams = Object.keys(dbData.teams);
        app.innerHTML = `
          <div class="flex flex-col items-center p-6">
            <div class="w-full flex justify-end mb-10">
              <button onclick="addTeam()" class="text-[10px] font-bold border border-slate-700 px-3 py-1 rounded">+ ADD TEAM</button>
            </div>
            <img src="https://i.ibb.co/s9vfBcCz/Ballers-BLogo-Final.png" class="w-24 mb-8">
            <div class="flex flex-col gap-4">
              ${teams.map(t => `<button onclick="goTeam('${t}')" class="btn-main btn-gradient">${t}</button>`).join('')}
              <button onclick="goTeam('Tryouts')" class="btn-main ${state.hasNewTryouts ? 'btn-green' : 'btn-outline'}">TRYOUTS</button>
              <button onclick="syncSheet()" class="btn-main border border-green-500 text-green-500">🔄 SYNC DATA</button>
              <button onclick="goTeam('Unrostered')" class="btn-main border border-slate-700 text-slate-600 bg-slate-900/50">UNROSTERED</button>
            </div>
          </div>
        `;
      }

      if (state.screen === 'roster') {
        const isTryouts = state.selectedTeam === 'Tryouts';
        const isUnrostered = state.selectedTeam === 'Unrostered';
        const players = Object.entries(dbData.players)
          .filter(([_, p]) => p.team === state.selectedTeam)
          .sort((a,b) => isTryouts ? new Date(b[1].signUpDate) - new Date(a[1].signUpDate) : 0);

        app.innerHTML = `
          <div class="p-4 max-w-md mx-auto">
            <div class="flex justify-between items-start mb-6">
              <button onclick="state.screen='main';render()" class="text-xs text-slate-500">BACK</button>
              <div class="text-center">
                <div class="flex items-center justify-center gap-2">
                    <h2 class="text-xl font-black italic uppercase">${state.selectedTeam}'S ROSTER</h2>
                    <span onclick="editTeam()" class="text-xs cursor-pointer">✏️</span>
                </div>
                <p class="text-[10px] text-slate-500 font-bold uppercase">${players.length} PLAYERS</p>
              </div>
              ${isTryouts ? `<button onclick="syncSheet()" class="text-[10px] font-bold bg-blue-600 px-3 py-1 rounded text-white">SYNC</button>` : `<div class="w-8"></div>`}
            </div>

            <div class="space-y-3">
              ${players.map(([id, p]) => `
                <div class="player-card p-4 rounded-xl flex justify-between items-center ${p.status === 'no-cut' ? 'inactive-card' : ''}">
                  <div onclick="openProfile('${id}')" class="cursor-pointer">
                    <p class="font-black uppercase">${p.fullName}</p>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">
                        ${isTryouts ? p.signUpDate : `#${p.jersey || '00'} • ${p.pos || 'POS'}`} • GR: ${p.grade}
                    </p>
                  </div>
                  <div>
                    ${isTryouts ? `<button onclick="openMigrate('${id}')" class="animate-migrate">MIGRATE</button>` : ''}
                    ${isUnrostered ? `<button onclick="movePlayerPrompt('${id}')" class="text-[9px] font-bold bg-white text-black px-2 py-1 rounded">ADD TO ROSTER</button>` : ''}
                    ${(!isTryouts && !isUnrostered) ? `
                      <div class="text-right">
                        <p class="text-[8px] font-bold text-slate-500 mb-1">${getMonth()}'S FEE</p>
                        <button onclick="openPay('${id}')" class="pay-status-btn text-[10px] font-black px-3 py-1 rounded ${p.paid ? 'bg-green-500/20 text-green-400' : 'bg-red-500 text-white'}">
                            ${p.paid ? 'PAID via '+p.payMethod : 'UNPAID'}
                        </button>
                      </div>
                    ` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }
    }

    // --- ACTIONS ---
    window.addTeam = () => {
        const name = prompt("Enter New Team Name:");
        if(name && confirm(`Create team "${name}"?`)) set(ref(db, `teams/${name}`), true);
    };

    window.editTeam = () => {
        const act = prompt("Type 'RENAME' or 'DELETE' team:");
        if(act === 'DELETE' && confirm("Delete this entire team and move players to Unrostered?")) {
            // Player movement logic would go here
            remove(ref(db, `teams/${state.selectedTeam}`));
            state.screen = 'main';
            render();
        }
    };

    window.goTeam = (t) => { state.selectedTeam = t; state.screen = 'roster'; render(); };

    window.openMigrate = (id) => {
        state.activeId = id;
        const choice = prompt("MIGRATE OPTIONS:\n1. MADE TEAM\n2. DIDNT MAKE TEAM\n3. SYNC TO PLAYER");
        if(choice === "1") {
            const target = prompt("Target Team Name (e.g. JV, Varsity):");
            if(target && confirm(`Move to ${target}?`)) {
                update(ref(db, `players/${id}`), { team: target, status: 'active' });
            }
        } else if (choice === "2") {
            if(confirm("Move athlete to Unrostered?")) {
                update(ref(db, `players/${id}`), { team: 'Unrostered', status: 'no-cut' });
            }
        } else if (choice === "3") {
            alert("Open Roster and select player to merge...");
        }
    };

    window.openProfile = (id) => {
        const p = dbData.players[id];
        const modal = document.createElement('div');
        modal.className = "fixed inset-0 bg-black/95 z-50 p-6 overflow-y-auto";
        modal.innerHTML = `
            <div class="max-w-sm mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black italic uppercase">Player Profile</h2>
                    <button onclick="this.parentElement.parentElement.parentElement.remove()" class="text-xl">✕</button>
                </div>
                <div class="space-y-4">
                    <div class="flex justify-between bg-slate-900 p-4 rounded border border-slate-800">
                        <span class="text-slate-500 font-bold text-xs uppercase">Move/Change</span>
                        <span onclick="migrateIconAction('${id}')" class="text-xl cursor-pointer">⇆</span>
                    </div>
                    <div class="grid grid-cols-1 gap-3">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Position</label>
                        <select id="p-pos" class="bg-slate-900 p-3 rounded border border-slate-700">
                            <option ${p.pos==='PG'?'selected':''}>PG</option>
                            <option ${p.pos==='SG'?'selected':''}>SG</option>
                            <option ${p.pos==='SF'?'selected':''}>SF</option>
                            <option ${p.pos==='PF'?'selected':''}>PF</option>
                            <option ${p.pos==='C'?'selected':''}>C</option>
                        </select>
                        <input id="p-name" value="${p.fullName}" class="bg-slate-900 p-3 rounded border border-slate-700">
                        <input id="p-parent" value="${p.parentName}" placeholder="Parent Name" class="bg-slate-900 p-3 rounded border border-slate-700">
                        <input id="p-phone" value="${p.parentPhone}" placeholder="Parent Phone" class="bg-slate-900 p-3 rounded border border-slate-700">
                        <input id="p-email" value="${p.parentEmail}" placeholder="Parent Email" class="bg-slate-900 p-3 rounded border border-slate-700">
                    </div>
                    <button onclick="saveProf('${id}')" class="w-full bg-green-500 text-black font-black py-4 rounded-xl uppercase">Save Changes</button>
                    <div class="border-t border-slate-800 pt-4">
                         <button onclick="addFile()" class="w-full border border-dashed border-slate-700 py-4 text-xs font-bold uppercase">+ Add Document/File</button>
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    };

    window.saveProf = (id) => {
        if(!confirm("Save profile updates?")) return;
        update(ref(db, `players/${id}`), {
            fullName: document.getElementById('p-name').value,
            parentName: document.getElementById('p-parent').value,
            parentPhone: document.getElementById('p-phone').value,
            parentEmail: document.getElementById('p-email').value,
            pos: document.getElementById('p-pos').value
        });
        document.querySelector('.fixed').remove();
    };

    window.migrateIconAction = (id) => {
        const move = prompt("1. CHANGE TEAM\n2. REMOVE TO UNROSTERED");
        if(move === "1") {
            const t = prompt("Enter new team name:");
            if(t && confirm(`Move to ${t}?`)) update(ref(db, `players/${id}`), { team: t });
        } else if (move === "2") {
            if(confirm("Remove from active roster?")) update(ref(db, `players/${id}`), { team: 'Unrostered', status: 'no-cut' });
        }
    };

    window.openPay = (id) => {
        const method = prompt("Select Payment Method:\nVENMO, CASHAPP, CREDIT CARD, OTHER");
        if(method && confirm(`Mark as PAID via ${method}?`)) {
            update(ref(db, `players/${id}`), { paid: true, payMethod: method.toUpperCase() });
        }
    };

    load();
  </script>
</body>
</html>
